<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIDOC — Pro Imagem</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0b4d77;
  --primary-d:#073655;
  --secondary:#d88a32;
  --secondary-d:#b5711f;
  --light:#f4f8fb;
  --dark:#1b2733;
  --white:#ffffff;
  --border:#dbe4ea;
  --green:#166534;
  --green-bg:#ecfdf5;
  --red:#991b1b;
  --red-bg:#fef2f2;
  --yellow:#854d0e;
  --yellow-bg:#fefce8;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:linear-gradient(180deg,#eef5fb,#ffffff);color:var(--dark);min-height:100vh}
#root{min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:3px solid;border-image:linear-gradient(90deg,var(--secondary),var(--primary)) 1;position:sticky;top:0;z-index:999;box-shadow:0 2px 20px rgba(11,77,119,.12)}
.container{width:min(1200px,95%);margin:auto}
.header-content{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.logo-area{display:flex;align-items:center;gap:14px;cursor:pointer}
.logo-img-wrap{background:#fff;border:2px solid var(--border);border-radius:10px;padding:5px 10px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(11,77,119,.08)}
.logo-area img{width:80px;display:block}
.logo-text h1{font-size:1.7rem;color:var(--primary);font-weight:800;letter-spacing:1px}
.logo-text h1 span{color:var(--secondary)}
.logo-text p{color:#888;font-size:.8rem;font-weight:500;letter-spacing:.3px}
.nav-back{display:flex;align-items:center;gap:8px}
.breadcrumb{font-size:.8rem;color:#888;display:flex;align-items:center;gap:6px}
.breadcrumb b{color:var(--primary);cursor:pointer}
.breadcrumb b:hover{color:var(--secondary)}

/* HERO */
.hero{padding:52px 20px 42px;text-align:center;background:linear-gradient(135deg,var(--primary-d) 0%,var(--primary) 60%,#1b7cbc 100%);color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero h2{font-size:2.6rem;margin-bottom:12px;font-weight:800;letter-spacing:-.5px;position:relative}
.hero h2 span{color:var(--secondary)}
.hero p{font-size:1rem;opacity:.9;max-width:600px;margin:auto;line-height:1.7;position:relative;font-weight:400}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px;margin-top:40px}
.card{background:white;border-radius:18px;padding:28px;border:2px solid var(--border);transition:.25s;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.05);position:relative;overflow:hidden}
.card::after{content:'→';position:absolute;bottom:20px;right:20px;font-size:1.2rem;color:var(--secondary);opacity:0;transition:.2s;transform:translateX(-4px)}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(11,77,119,.12);border-color:var(--primary)}
.card:hover::after{opacity:1;transform:translateX(0)}
.card .icon{width:62px;height:62px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:18px;background:linear-gradient(135deg,var(--primary),#1b7cbc)}
.card h3{color:var(--primary);margin-bottom:8px;font-size:.95rem;font-weight:700}
.card p{font-size:.8rem;color:#777;line-height:1.6;font-weight:400}
.card .tag{display:inline-block;margin-top:12px;background:linear-gradient(135deg,var(--primary),#1b7cbc);color:#fff;font-size:.65rem;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.6px;text-transform:uppercase}

/* TOOL BOX */
.tool-box{background:white;padding:32px;border-radius:22px;margin-top:36px;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.06)}
.tool-box h2{color:var(--primary);font-size:1.4rem;font-weight:800;margin-bottom:6px}
.tool-box .tool-sub{color:#888;font-size:.85rem;margin-bottom:24px;font-weight:400}
.dropzone{border:2px dashed #b8cad6;border-radius:16px;padding:46px 20px;text-align:center;transition:.2s;cursor:pointer;background:#f9fcff;position:relative}
.dropzone:hover{background:#edf6fd;border-color:var(--primary)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dropzone h3{color:var(--primary);margin-bottom:8px;font-size:1rem}
.dropzone p{color:#999;font-size:.82rem;font-weight:400}

/* PAGES */
.pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:28px}
.page-card{background:#f9fcff;border-radius:12px;border:1.5px solid var(--border);padding:10px;transition:.15s}
.page-card:hover{border-color:var(--primary)}
.page-card canvas{width:100%;border-radius:8px}
.page-card small{display:block;margin-top:8px;color:#888;font-size:.72rem;font-weight:400}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-weight:700;font-size:.8rem;color:var(--primary);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:.9rem;font-family:'Montserrat',sans-serif;outline:none;transition:.2s;background:#fafcff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(11,77,119,.08)}
.field textarea{resize:vertical;min-height:80px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;border:none;border-radius:12px;padding:0 24px;background:linear-gradient(135deg,var(--secondary),var(--secondary-d));color:white;font-weight:700;font-size:.88rem;cursor:pointer;transition:.2s;letter-spacing:.3px}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(216,138,50,.35)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-blue{background:linear-gradient(135deg,var(--primary),#1b7cbc)}
.btn-blue:hover:not(:disabled){box-shadow:0 6px 20px rgba(11,77,119,.3)}
.btn-ghost{background:none;border:1.5px solid var(--border);color:#888;height:44px;padding:0 18px;border-radius:10px;font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s}
.btn-ghost:hover{border-color:var(--red-bg);color:#dc2626;background:#fef2f2}
.btn-sm{height:38px;padding:0 16px;font-size:.78rem;border-radius:9px}
.action-area{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* SPLIT LIST */
.split-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;margin-top:16px;padding-right:4px}
.split-list::-webkit-scrollbar{width:4px}
.split-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.split-row{display:flex;align-items:center;gap:10px;background:#f9fcff;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;transition:.15s}
.split-row:hover{border-color:var(--primary)}
.split-row input[type=checkbox]{accent-color:var(--secondary);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.split-thumb{width:38px;height:50px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.split-thumb canvas{max-width:38px;max-height:50px}
.split-info{flex:1;min-width:0}
.split-info-name{font-size:.8rem;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.split-info-pg{font-size:.7rem;color:#999}

/* COMPRESS OPTIONS */
.compress-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.compress-opt{border:2px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.2s;text-align:center}
.compress-opt:hover{border-color:var(--primary)}
.compress-opt.active{border-color:var(--secondary);background:#fef9f3}
.compress-opt-icon{font-size:1.5rem;margin-bottom:6px}
.compress-opt-label{font-size:.82rem;font-weight:700;color:var(--dark)}
.compress-opt-desc{font-size:.7rem;color:#999;margin-top:3px;font-weight:400}

/* RESULT BOX */
.result-box{background:linear-gradient(135deg,#eef5fb,#ddeeff);border:1.5px solid #b8d4ee;border-radius:14px;padding:20px;margin-top:20px}
.result-stats{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;text-align:center;margin-bottom:16px}
.result-stat-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:4px}
.result-stat-val{font-size:1.2rem;font-weight:800}

/* PROTECT */
.perms-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.perm-row{display:flex;align-items:center;gap:10px;background:#f9fcff;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:.15s}
.perm-row:hover{border-color:var(--primary)}
.perm-row input[type=checkbox]{accent-color:var(--primary);width:15px;height:15px;flex-shrink:0}
.perm-row-label{font-size:.8rem;font-weight:600}

/* WATERMARK */
.wm-preview{background:#f9fcff;border:1.5px dashed var(--border);border-radius:12px;padding:30px;text-align:center;color:#bbb;font-size:1.8rem;font-weight:800;letter-spacing:2px;margin-top:16px;opacity:.5;position:relative;overflow:hidden;min-height:100px;display:flex;align-items:center;justify-content:center}

/* CONVERT GRID */
.conv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.conv-item{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.05)}
.conv-thumb{height:110px;display:flex;align-items:center;justify-content:center;background:#f9fcff;overflow:hidden}
.conv-thumb img{max-width:100%;max-height:110px;object-fit:contain}
.conv-dl-btn{width:100%;padding:8px;background:linear-gradient(135deg,var(--secondary),var(--secondary-d));border:none;color:#fff;font-size:.72rem;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.conv-dl-btn:hover{filter:brightness(1.08)}

/* ALERTS */
.alert{margin-top:16px;padding:12px 16px;border-radius:12px;font-size:.83rem;display:flex;align-items:flex-start;gap:8px;font-weight:500;line-height:1.5}
.success{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.error{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid #fde68a}

/* PROGRESS */
.prog-wrap{margin-top:14px}
.prog-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));transition:width .3s;border-radius:6px}
.prog-label{font-size:.75rem;color:#888;margin-bottom:6px;font-weight:500}

/* SPIN */
.spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
.spin-blue{border-color:rgba(11,77,119,.15);border-top-color:var(--primary)}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-line{display:flex;align-items:center;gap:8px;color:#888;font-size:.82rem;margin-top:12px}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-info h2{color:var(--primary);font-size:1.3rem;font-weight:800}
.section-info p{color:#888;font-size:.82rem;font-weight:400}

/* FOOTER */
footer{margin-top:auto;background:linear-gradient(135deg,var(--primary-d),var(--primary));color:white;text-align:center;padding:32px 20px}
footer p{font-size:.82rem;opacity:.8;line-height:1.8}
footer strong{color:var(--secondary);font-weight:700}

/* PWD INPUT */
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:44px}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.95rem;color:#999;line-height:1}

@media(max-width:700px){.hero h2{font-size:1.8rem}.grid{grid-template-columns:repeat(2,1fr)}.compress-opts,.perms-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const LOGO = JSON.parse(document.getElementById('LOGO_DATA').textContent);

/* ── Helpers ────────────────────────────────────────────────── */
function fmtSize(n){ return n>1048576?`${(n/1048576).toFixed(1)} MB`:`${Math.round(n/1024)} KB`; }

async function extractPdfText(pdfDoc, maxPages=3){
  let text='';
  for(let i=1;i<=Math.min(pdfDoc.numPages,maxPages);i++){
    const pg=await pdfDoc.getPage(i);
    const tc=await pg.getTextContent();
    text+=tc.items.map(x=>x.str).join(' ')+' ';
  }
  return text;
}

function parseDate(t){
  const pats=[
    {re:/\b(\d{2})[\/.\-](\d{2})[\/.\-](\d{4})\b/,fn:m=>`${m[3]}-${m[2]}-${m[1]}`},
    {re:/\b(\d{2})[\/.\-](\d{2})[\/.\-](\d{2})\b/,fn:m=>`20${m[3]}-${m[2]}-${m[1]}`},
    {re:/\b(\d{4})-(\d{2})-(\d{2})\b/,fn:m=>`${m[1]}-${m[2]}-${m[3]}`},
    {re:/(\d{1,2})\s+de\s+(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[a-z]*.?\s+(\d{4})/i,
     fn:m=>{const M={jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'};
            return `${m[3]}-${M[m[2].toLowerCase().slice(0,3)]}-${m[1].padStart(2,'0')}`;}}
  ];
  for(const{re,fn}of pats){const m=t.match(re);if(m)return fn(m);}
  return '';
}

function parseValue(t){
  const pats=[
    /(?:Valor\s+(?:do\s+)?(?:Documento|Pago|Total|Nominal|Líquido|Liquido|da\s+Nota)|Total\s+(?:do\s+Documento|da\s+Nota))\s*(?:R\$\s*)?([\d\.]+,\d{2})/i,
    /R\$\s*([\d\.]+,\d{2})/i
  ];
  for(const re of pats){
    const m=t.match(re);
    if(m){
      const raw=m[1].replace(/\./g,'').replace(',','.');
      return `R$ ${parseFloat(raw).toFixed(2)}`;
    }
  }
  return '';
}

function parseProvider(t){
  const pats=[
    /(?:Razão Social|Beneficiário|Cedente|Prestador|Emitente)[:\s]+([^\n\r\t;:,]+)/i,
    /([A-Z][A-ZÀ-Ý\s\.]{3,}(?:LTDA|S\.A\.|EPP|ME|CLINICA|HOSPITAL|LABORATÓRIO|LABORATORIO))/
  ];
  for(const re of pats){const m=t.match(re);if(m&&m[1].trim().length>3)return m[1].split(/[;:,]/)[0].trim().replace(/\s+/g,' ');}
  return '';
}

/* ── PagePreview ────────────────────────────────────────────── */
function PagePreview({page}){
  const ref=useRef(null);
  useEffect(()=>{
    (async()=>{
      const buf=await page.file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const pg=await pdf.getPage(page.pageIndex+1);
      const vp=pg.getViewport({scale:.45});
      const canvas=ref.current;
      canvas.width=vp.width; canvas.height=vp.height;
      await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    })();
  },[]);
  return(
    <div className="page-card">
      <canvas ref={ref}></canvas>
      <small>{page.file.name} — p.{page.pageIndex+1}</small>
    </div>
  );
}

/* ── SplitThumb ─────────────────────────────────────────────── */
function SplitThumb({pdfDoc,n}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!pdfDoc||!ref.current)return;
    (async()=>{
      const pg=await pdfDoc.getPage(n);
      const vp=pg.getViewport({scale:.4});
      const ctx=ref.current.getContext('2d');
      ref.current.width=vp.width; ref.current.height=vp.height;
      await pg.render({canvasContext:ctx,viewport:vp}).promise;
    })();
  },[pdfDoc,n]);
  return <canvas ref={ref} style={{maxWidth:38,maxHeight:50}}/>;
}

/* ══════════════════════════════════════════════════════════════
   MERGE TOOL
══════════════════════════════════════════════════════════════ */
function MergeTool(){
  const[pages,setPages]=useState([]);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);
  const[data,setData]=useState('');
  const[prestador,setPrestador]=useState('');
  const[valor,setValor]=useState('');

  async function autoExtract(pdfDoc){
    try{
      const text=await extractPdfText(pdfDoc,2);
      const d=parseDate(text);
      if(d)setData(d);
      const v=parseValue(text);
      if(v)setValor(v);
      const p=parseProvider(text);
      if(p)setPrestador(p);
    }catch{}
  }

  async function handleFiles(e){
    const files=Array.from(e.target.files||e.dataTransfer.files).filter(f=>f.type==='application/pdf');
    const list=[];
    let first=null;
    for(const file of files){
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      if(!first)first=pdf;
      for(let i=0;i<pdf.numPages;i++)list.push({id:crypto.randomUUID(),file,pageIndex:i});
    }
    setPages(prev=>[...prev,...list]);
    if(first)setTimeout(()=>autoExtract(first),300);
  }

  async function generate(){
    setLoading(true);setMsg(null);
    try{
      const pdfDoc=await PDFLib.PDFDocument.create();
      for(const item of pages){
        const buf=await item.file.arrayBuffer();
        const src=await PDFLib.PDFDocument.load(buf);
        const[pg]=await pdfDoc.copyPages(src,[item.pageIndex]);
        pdfDoc.addPage(pg);
      }
      const bytes=await pdfDoc.save();
      const blob=new Blob([bytes],{type:'application/pdf'});
      const url=URL.createObjectURL(blob);
      const d=data?data.split('-').reverse().join('-'):'';
      const v=valor?valor.replace(/,/g,'.'):'';
      const name=`${d}; BOLETO E COMPROVANTE; ${prestador||'Prestador'}; ${v}.pdf`.replace(/\s+/g,' ');
      Object.assign(document.createElement('a'),{href:url,download:name}).click();
      URL.revokeObjectURL(url);
      setMsg({t:'success',s:'PDF gerado com sucesso!'});
    }catch(e){setMsg({t:'error',s:'Erro ao gerar: '+e.message});}
    finally{setLoading(false);}
  }

  return(
    <div className="tool-box">
      <h2>Juntar PDFs</h2>
      <p className="tool-sub">Combine múltiplos PDFs em um único arquivo com nome automático</p>
      <div className="dropzone" onClick={()=>document.getElementById('mi').click()}
        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFiles(e);}}>
        <h3>📂 Arraste seus arquivos PDF</h3>
        <p>Clique ou solte os arquivos aqui</p>
        <input id="mi" type="file" hidden multiple accept=".pdf" onChange={handleFiles}/>
      </div>
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
      {pages.length>0&&(<>
        <div className="pages">{pages.map(p=><PagePreview key={p.id} page={p}/>)}</div>
        <hr style={{margin:'24px 0',border:'none',borderTop:'1px solid var(--border)'}}/>
        <h3 style={{color:'var(--primary)',marginBottom:16}}>📝 Dados Reconhecidos</h3>
        <div className="form-grid">
          <div className="field"><label>Data de Pagamento</label><input type="date" value={data} onChange={e=>setData(e.target.value)}/></div>
          <div className="field"><label>Prestador / Empresa</label><input type="text" placeholder="Ex: Eletrobras SA" value={prestador} onChange={e=>setPrestador(e.target.value)}/></div>
          <div className="field"><label>Valor (R$)</label><input type="text" placeholder="R$ 600.00" value={valor} onChange={e=>setValor(e.target.value)}/></div>
        </div>
        <div className="action-area">
          <button className="btn btn-blue" onClick={generate} disabled={loading}>
            {loading?<><span className="spin"></span>Gerando…</>:'💾 Gerar e Salvar PDF'}
          </button>
          <button className="btn-ghost" onClick={()=>{setPages([]);setMsg(null);setData('');setPrestador('');setValor('');}}>Limpar tudo</button>
        </div>
      </>)}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   SPLIT TOOL
══════════════════════════════════════════════════════════════ */
function SplitTool(){
  const[file,setFile]=useState(null);
  const[pdfDoc,setPdfDoc]=useState(null);
  const[numPages,setNumPages]=useState(0);
  const[selected,setSelected]=useState([]);
  const[loading,setLoading]=useState(false);
  const[progress,setProgress]=useState(0);
  const[msg,setMsg]=useState(null);

  async function loadFile(f){
    if(!f||f.type!=='application/pdf')return;
    setLoading(true);
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    setFile(f);setPdfDoc(pdf);setNumPages(pdf.numPages);
    setSelected(Array.from({length:pdf.numPages},(_,i)=>i+1));
    setMsg(null);setLoading(false);
  }

  const toggle=n=>setSelected(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n].sort((a,b)=>a-b));
  const toggleAll=()=>setSelected(selected.length===numPages?[]:Array.from({length:numPages},(_,i)=>i+1));

  async function dlPage(n){
    const{PDFDocument}=PDFLib;
    const buf=await file.arrayBuffer();
    const src=await PDFDocument.load(buf);
    const doc=await PDFDocument.create();
    const[cp]=await doc.copyPages(src,[n-1]);
    doc.addPage(cp);
    const out=await doc.save();
    const base=file.name.replace(/\.pdf$/i,'');
    Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),
      download:`${base}_pagina_${n}.pdf`
    }).click();
  }

  async function dlZip(){
    setLoading(true);setProgress(0);setMsg(null);
    try{
      const{PDFDocument}=PDFLib;
      const buf=await file.arrayBuffer();
      const src=await PDFDocument.load(buf);
      const zip=new JSZip();
      const base=file.name.replace(/\.pdf$/i,'');
      for(let i=0;i<selected.length;i++){
        const n=selected[i];
        const doc=await PDFDocument.create();
        const[cp]=await doc.copyPages(src,[n-1]);
        doc.addPage(cp);
        zip.file(`${base}_pagina_${n}.pdf`,await doc.save());
        setProgress(Math.round(((i+1)/selected.length)*100));
      }
      const blob=await zip.generateAsync({type:'blob'});
      Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${base}_dividido.zip`}).click();
      setMsg({t:'success',s:`${selected.length} página(s) exportadas como ZIP.`});
    }catch(e){setMsg({t:'error',s:'Erro: '+e.message});}
    finally{setLoading(false);setProgress(0);}
  }

  return(
    <div className="tool-box">
      <h2>Dividir PDF</h2>
      <p className="tool-sub">Extraia páginas individualmente ou baixe um conjunto como ZIP</p>
      {!file?(
        <div className="dropzone" onClick={()=>document.getElementById('si').click()}
          onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();loadFile(e.dataTransfer.files[0]);}}>
          <h3>✂️ Selecione o PDF</h3><p>Clique ou arraste aqui</p>
          <input id="si" type="file" hidden accept=".pdf" onChange={e=>loadFile(e.target.files[0])}/>
        </div>
      ):(
        <>
          <div className="section-header">
            <div className="section-info">
              <h2>{file.name}</h2>
              <p>{numPages} páginas · {selected.length} selecionada{selected.length!==1?'s':''}</p>

            <div style={{display:'flex',gap:8}}>
              <button className="btn-ghost btn-sm" onClick={toggleAll}>{selected.length===numPages?'Desmarcar tudo':'Selecionar tudo'}</button>
              <button className="btn-ghost btn-sm" onClick={()=>{setFile(null);setPdfDoc(null);setNumPages(0);setSelected([]);setMsg(null);}}>Trocar arquivo</button>
            </div>
          </div>
          {loading&&progress>0&&<div className="prog-wrap"><div className="prog-label">Gerando ZIP… {progress}%</div><div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}></div></div></div>}
          <div className="split-list">
            {Array.from({length:numPages},(_,i)=>i+1).map(n=>(
              <div key={n} className="split-row">
                <input type="checkbox" checked={selected.includes(n)} onChange={()=>toggle(n)}/>
                <div className="split-thumb">{pdfDoc&&<SplitThumb pdfDoc={pdfDoc} n={n}/>}</div>
                <div className="split-info">
                  <div className="split-info-name">{file.name.replace(/\.pdf$/i,'')}</div>
                  <div className="split-info-pg">Página {n} de {numPages}</div>
                </div>
                <button className="btn btn-sm" style={{background:'var(--primary)',marginLeft:'auto'}} onClick={()=>dlPage(n)}>⬇ Baixar</button>
              </div>
            ))}

            <button className="btn btn-blue" onClick={dlZip} disabled={!selected.length||loading}>
              {loading?<><span className="spin"></span>Gerando…</>:<>📦 Baixar {selected.length} pág. como ZIP</>}
            </button>
          </div>
          {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   COMPRESS TOOL (100% no browser)
══════════════════════════════════════════════════════════════ */
function CompressTool(){
  const[file,setFile]=useState(null);
  const[loading,setLoading]=useState(false);
  const[progress,setProgress]=useState(0);
  const[msg,setMsg]=useState(null);
  const[result,setResult]=useState(null);
  const[quality,setQuality]=useState('0.72');

  const levels=[
    {v:'0.85',icon:'🟢',label:'Leve',desc:'Menor perda visual'},
    {v:'0.72',icon:'🟡',label:'Equilibrado',desc:'Boa compressão'},
    {v:'0.50',icon:'🔴',label:'Máximo',desc:'Arquivo muito menor'},
  ];

  async function compress(f){
    if(!f||f.type!=='application/pdf'){setMsg({t:'error',s:'Selecione um PDF válido.'});return;}
    setFile(f);setLoading(true);setMsg(null);setResult(null);setProgress(0);
    try{
      const{PDFDocument}=PDFLib;
      const origBytes=new Uint8Array(await f.arrayBuffer());
      const srcPdf=await pdfjsLib.getDocument({data:origBytes}).promise;
      const dest=await PDFDocument.create();
      const q=parseFloat(quality);
      for(let i=1;i<=srcPdf.numPages;i++){
        const pg=await srcPdf.getPage(i);
        const vp=pg.getViewport({scale:1.6});
        const canvas=document.createElement('canvas');
        canvas.width=vp.width;canvas.height=vp.height;
        await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
        const dataUrl=canvas.toDataURL('image/jpeg',q);
        const imgBytes=await(await fetch(dataUrl)).arrayBuffer();
        const img=await dest.embedJpg(imgBytes);
        const p=dest.addPage([vp.width,vp.height]);
        p.drawImage(img,{x:0,y:0,width:vp.width,height:vp.height});
        setProgress(Math.round((i/srcPdf.numPages)*100));
      }
      const outBytes=await dest.save();
      const reduction=Math.round((1-outBytes.length/origBytes.length)*100);
      setResult({bytes:outBytes,origSize:origBytes.length,newSize:outBytes.length,reduction,filename:f.name.replace(/\.pdf$/i,'')+'_comprimido.pdf'});
    }catch(e){setMsg({t:'error',s:'Erro ao comprimir: '+e.message});}
    finally{setLoading(false);setProgress(0);}
  }

  function download(){
    const blob=new Blob([result.bytes],{type:'application/pdf'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:result.filename}).click();
  }

  return(
    <div className="tool-box">
      <h2>Comprimir PDF</h2>
      <p className="tool-sub">Reduza o tamanho do arquivo. Processamento 100% local, sem envio de dados</p>
      <div className="compress-opts">
        {levels.map(l=>(
          <div key={l.v} className={`compress-opt${quality===l.v?' active':''}`} onClick={()=>setQuality(l.v)}>
            <div className="compress-opt-icon">{l.icon}</div>
            <div className="compress-opt-label">{l.label}</div>
            <div className="compress-opt-desc">{l.desc}</div>
          </div>
        ))}
      </div>
      <div className="dropzone" onClick={()=>document.getElementById('ci').click()}
        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();compress(e.dataTransfer.files[0]);}}>
        {file
          ?<><h3 style={{color:'var(--primary)'}}>📄 {file.name}</h3><p>Clique para trocar o arquivo</p></>
          :<><h3>📦 Selecione o PDF para comprimir</h3><p>Clique ou arraste aqui</p></>}
        <input id="ci" type="file" hidden accept=".pdf" onChange={e=>compress(e.target.files[0])}/>
      </div>
      {loading&&<div className="prog-wrap"><div className="prog-label">Comprimindo… {progress}%</div><div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}></div></div></div>}
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
      {result&&(
        <div className="result-box">
          <div className="result-stats">
            <div><div className="result-stat-label" style={{color:'#888'}}>Original</div><div className="result-stat-val" style={{color:'var(--dark)'}}>{fmtSize(result.origSize)}</div></div>
            <div style={{fontSize:'1.6rem',color:'#aaa'}}>→</div>
            <div><div className="result-stat-label" style={{color:'var(--green)'}}>Comprimido</div><div className="result-stat-val" style={{color:'var(--green)'}}>{fmtSize(result.newSize)}</div></div>
          </div>
          <p style={{textAlign:'center',marginBottom:16,fontSize:'.88rem',fontWeight:700,color:result.reduction>0?'var(--primary)':'var(--red)'}}>
            {result.reduction>0?`🎉 Redução de ${result.reduction}%`:`⚠ Arquivo ficou maior (tente nível Máximo)`}
          </p>
          <button className="btn btn-blue" style={{width:'100%'}} onClick={download}>⬇ Baixar PDF Comprimido</button>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PROTECT TOOL (pdf-lib encryption)
══════════════════════════════════════════════════════════════ */
function ProtectTool(){
  const[file,setFile]=useState(null);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);
  const[userPwd,setUserPwd]=useState('');
  const[ownerPwd,setOwnerPwd]=useState('');
  const[showPwd,setShowPwd]=useState(false);
  const[perms,setPerms]=useState({printing:true,copying:false,modifying:false,annotating:false});

  const PERMS=[
    {k:'printing',icon:'🖨️',label:'Permitir impressão'},
    {k:'copying',icon:'📋',label:'Permitir copiar texto'},
    {k:'modifying',icon:'✏️',label:'Permitir edição'},
    {k:'annotating',icon:'💬',label:'Permitir comentários'},
  ];

  async function protect(){
    if(!file){setMsg({t:'error',s:'Selecione um PDF.'});return;}
    if(!userPwd.trim()){setMsg({t:'error',s:'Digite a senha de abertura.'});return;}
    setLoading(true);setMsg(null);
    try{
      const{PDFDocument}=PDFLib;
      const buf=await file.arrayBuffer();
      const doc=await PDFDocument.load(buf,{ignoreEncryption:true});
      const out=await doc.save({
        userPassword:userPwd,
        ownerPassword:ownerPwd||userPwd+'_owner_'+Date.now(),
        permissions:{
          printing:perms.printing?'highResolution':'none',
          modifying:perms.modifying,
          copying:perms.copying,
          annotating:perms.annotating,
          fillingForms:false,
          contentAccessibility:true,
          documentAssembly:false,
        }
      });
      const fname=file.name.replace(/\.pdf$/i,'')+'_protegido.pdf';
      Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),download:fname}).click();
      setMsg({t:'success',s:`PDF protegido salvo como "${fname}"!`});
    }catch(e){setMsg({t:'error',s:`Erro ao proteger: ${e.message}. Alguns PDFs já criptografados podem não funcionar.`});}
    finally{setLoading(false);}
  }

  return(
    <div className="tool-box">
      <h2>Proteger PDF com Senha</h2>
      <p className="tool-sub">Adicione criptografia e restrições de acesso ao seu documento</p>
      <div className="dropzone" onClick={()=>document.getElementById('pi').click()}
        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setFile(e.dataTransfer.files[0]);setMsg(null);}}>
        {file
          ?<><h3 style={{color:'var(--primary)'}}>🔒 {file.name}</h3><p>Clique para trocar</p></>
          :<><h3>🔒 Selecione o PDF para proteger</h3><p>Clique ou arraste aqui</p></>}
        <input id="pi" type="file" hidden accept=".pdf" onChange={e=>{setFile(e.target.files[0]);setMsg(null);}}/>
      </div>
      <div className="form-grid" style={{marginTop:20}}>
        <div className="field">
          <label>Senha para abrir o arquivo *</label>
          <div className="pwd-wrap">
            <input type={showPwd?'text':'password'} value={userPwd} onChange={e=>setUserPwd(e.target.value)} placeholder="Digite a senha de abertura"/>
            <button className="pwd-toggle" onClick={()=>setShowPwd(p=>!p)}>{showPwd?'🙈':'👁️'}</button>
          </div>
        </div>
        <div className="field">
          <label>Senha do proprietário (opcional)</label>
          <input type={showPwd?'text':'password'} value={ownerPwd} onChange={e=>setOwnerPwd(e.target.value)} placeholder="Deixe vazio para gerar automaticamente"/>
        </div>
      </div>
      <div style={{marginTop:18,marginBottom:6}}>
        <label style={{display:'block',fontWeight:700,fontSize:'.8rem',color:'var(--primary)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12}}>Permissões</label>
        <div className="perms-grid">
          {PERMS.map(({k,icon,label})=>(
            <label key={k} className="perm-row" onClick={()=>setPerms(p=>({...p,[k]:!p[k]}))}>
              <input type="checkbox" checked={perms[k]} onChange={()=>setPerms(p=>({...p,[k]:!p[k]}))} onClick={e=>e.stopPropagation()}/>
              <span style={{fontSize:'1.1rem'}}>{icon}</span>
              <span className="perm-row-label">{label}</span>
            </label>
          ))}
        </div>
      </div>
      <div className="alert info" style={{marginBottom:12}}><span>ℹ</span> Guarde a senha com segurança — não é possível recuperá-la depois.</div>
      <button className="btn btn-blue" style={{width:'100%'}} onClick={protect} disabled={loading||!userPwd.trim()}>
        {loading?<><span className="spin"></span>Protegendo…</>:'🔒 Gerar PDF Protegido'}
      </button>
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROTATE TOOL
══════════════════════════════════════════════════════════════ */
function RotateTool(){
  const[file,setFile]=useState(null);
  const[angle,setAngle]=useState(90);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);

  async function generate(){
    if(!file)return;
    setLoading(true);setMsg(null);
    try{
      const buf=await file.arrayBuffer();
      const doc=await PDFLib.PDFDocument.load(buf);
      doc.getPages().forEach(p=>{
        const cur=p.getRotation().angle;
        p.setRotation(PDFLib.degrees(cur+Number(angle)));
      });
      const out=await doc.save();
      Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),download:`Rotacionado-${file.name}`}).click();
      setMsg({t:'success',s:'PDF rotacionado com sucesso!'});
    }catch(e){setMsg({t:'error',s:'Erro: '+e.message});}
    finally{setLoading(false);}
  }

  return(
    <div className="tool-box">
      <h2>Rotacionar PDF</h2>
      <p className="tool-sub">Gire todas as páginas do PDF no ângulo desejado</p>
      {!file?(
        <div className="dropzone" onClick={()=>document.getElementById('ri').click()}
          onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setFile(e.dataTransfer.files[0]);}}>
          <h3>🔄 Selecione o PDF</h3><p>Clique ou arraste aqui</p>
          <input id="ri" type="file" hidden accept=".pdf" onChange={e=>setFile(e.target.files[0])}/>
        </div>
      ):(
        <>
          <div className="alert success" style={{marginBottom:20}}>📄 <strong>{file.name}</strong> carregado.</div>
          <div className="form-grid">
            <div className="field"><label>Ângulo de Rotação</label>
              <select value={angle} onChange={e=>setAngle(e.target.value)}>
                <option value="90">90° (sentido horário)</option>
                <option value="-90">90° (sentido anti-horário)</option>
                <option value="180">180° (inverter)</option>
              </select>
            </div>
          </div>
          <div className="action-area">
            <button className="btn btn-blue" onClick={generate} disabled={loading}>{loading?<><span className="spin"></span>Processando…</>:'🔄 Aplicar Rotação'}</button>
            <button className="btn-ghost" onClick={()=>{setFile(null);setMsg(null);}}>Cancelar</button>
          </div>
        </>
      )}
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PDF → IMAGES TOOL
══════════════════════════════════════════════════════════════ */
function ConvertTool(){
  const[file,setFile]=useState(null);
  const[images,setImages]=useState([]);
  const[loading,setLoading]=useState(false);
  const[progress,setProgress]=useState(0);
  const[msg,setMsg]=useState(null);
  const[dpi,setDpi]=useState('150');

  async function convert(f){
    if(!f||f.type!=='application/pdf'){setMsg({t:'error',s:'Selecione um PDF.'});return;}
    setFile(f);setLoading(true);setImages([]);setMsg(null);setProgress(0);
    try{
      const scale=parseInt(dpi)/96;
      const buf=await f.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const imgs=[];
      for(let i=1;i<=pdf.numPages;i++){
        const pg=await pdf.getPage(i);
        const vp=pg.getViewport({scale});
        const canvas=document.createElement('canvas');
        canvas.width=vp.width;canvas.height=vp.height;
        await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
        imgs.push({page:i,url:canvas.toDataURL('image/jpeg',0.92)});
        setProgress(Math.round((i/pdf.numPages)*100));
      }
      setImages(imgs);
    }catch(e){setMsg({t:'error',s:'Erro: '+e.message});}
    finally{setLoading(false);setProgress(0);}
  }

  async function dlAll(){
    const zip=new JSZip();const base=file.name.replace(/\.pdf$/i,'');
    for(const img of images){zip.file(`${base}_pagina_${img.page}.jpg`,await(await fetch(img.url)).blob());}
    const blob=await zip.generateAsync({type:'blob'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${base}_imagens.zip`}).click();
  }

  return(
    <div className="tool-box">
      <h2>PDF → Imagens</h2>
      <p className="tool-sub">Converta cada página em JPEG de alta qualidade para download</p>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div className="field" style={{flex:'0 0 auto'}}>
          <label>Qualidade</label>
          <select value={dpi} onChange={e=>setDpi(e.target.value)}>
            <option value="96">96 dpi — Rápido</option>
            <option value="150">150 dpi — Padrão</option>
            <option value="200">200 dpi — Alta qualidade</option>
            <option value="300">300 dpi — Impressão</option>
          </select>
        </div>
        <div style={{flex:1}}>
          <div className="dropzone" style={{padding:'18px 16px'}} onClick={()=>document.getElementById('imi').click()}
            onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();convert(e.dataTransfer.files[0]);}}>
            {file?<><h3 style={{color:'var(--primary)',fontSize:'.95rem'}}>📄 {file.name}</h3><p>Clique para trocar</p></>:<><h3>🖼️ Selecione um PDF</h3><p>Clique ou arraste aqui</p></>}
            <input id="imi" type="file" hidden accept=".pdf" onChange={e=>convert(e.target.files[0])}/>
          </div>
        </div>
      </div>
      {loading&&<div className="prog-wrap"><div className="prog-label">Convertendo… {progress}%</div><div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}></div></div></div>}
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
      {images.length>0&&(<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'16px 0 8px'}}>
          <span style={{fontSize:'.82rem',color:'#888'}}>{images.length} imagem{images.length!==1?'s':''} gerada{images.length!==1?'s':''}</span>
          <button className="btn btn-sm btn-blue" onClick={dlAll}>📦 Baixar todas (ZIP)</button>
        </div>
        <div className="conv-grid">
          {images.map(img=>(
            <div key={img.page} className="conv-item">
              <div className="conv-thumb"><img src={img.url} alt={`Pág ${img.page}`}/></div>
              <a href={img.url} download={`${file.name.replace(/\.pdf$/i,'')}_pagina_${img.page}.jpg`}>
                <div className="conv-dl-btn">⬇ Pág. {img.page}</div>
              </a>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   WATERMARK TOOL
══════════════════════════════════════════════════════════════ */
function WatermarkTool(){
  const[file,setFile]=useState(null);
  const[text,setText]=useState('CONFIDENCIAL');
  const[opacity,setOpacity]=useState('0.15');
  const[size,setSize]=useState('48');
  const[color,setColor]=useState('#1a1a1a');
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);

  async function apply(){
    if(!file){setMsg({t:'error',s:'Selecione um PDF.'});return;}
    if(!text.trim()){setMsg({t:'error',s:'Digite o texto da marca d\'água.'});return;}
    setLoading(true);setMsg(null);
    try{
      const{PDFDocument,rgb,StandardFonts,degrees}=PDFLib;
      const buf=await file.arrayBuffer();
      const doc=await PDFDocument.load(buf);
      const font=await doc.embedFont(StandardFonts.HelveticaBold);
      const pages=doc.getPages();
      const op=parseFloat(opacity);
      const fs=parseInt(size);
      const hex=color.replace('#','');
      const r=parseInt(hex.slice(0,2),16)/255;
      const g=parseInt(hex.slice(2,4),16)/255;
      const b=parseInt(hex.slice(4,6),16)/255;
      pages.forEach(pg=>{
        const{width,height}=pg.getSize();
        const tw=font.widthOfTextAtSize(text,fs);
        pg.drawText(text,{
          x:(width-tw)/2, y:(height-fs)/2,
          size:fs, font, color:rgb(r,g,b),
          opacity:op, rotate:degrees(45)
        });
      });
      const out=await doc.save();
      const fname=file.name.replace(/\.pdf$/i,'')+'_marca_dagua.pdf';
      Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),download:fname}).click();
      setMsg({t:'success',s:`Marca d'água aplicada e salva como "${fname}"!`});
    }catch(e){setMsg({t:'error',s:'Erro: '+e.message});}
    finally{setLoading(false);}
  }

  return(
    <div className="tool-box">
      <h2>Marca D'água</h2>
      <p className="tool-sub">Adicione texto diagonal em todas as páginas do PDF</p>
      <div className="dropzone" onClick={()=>document.getElementById('wi').click()}
        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setFile(e.dataTransfer.files[0]);setMsg(null);}}>
        {file?<><h3 style={{color:'var(--primary)'}}>📄 {file.name}</h3><p>Clique para trocar</p></>:<><h3>💧 Selecione o PDF</h3><p>Clique ou arraste aqui</p></>}
        <input id="wi" type="file" hidden accept=".pdf" onChange={e=>{setFile(e.target.files[0]);setMsg(null);}}/>
      </div>
      <div className="form-grid" style={{marginTop:20}}>
        <div className="field"><label>Texto da Marca</label><input type="text" value={text} onChange={e=>setText(e.target.value)} placeholder="Ex: CONFIDENCIAL"/></div>
        <div className="field"><label>Tamanho da fonte</label>
          <select value={size} onChange={e=>setSize(e.target.value)}>
            <option value="32">Pequeno (32pt)</option>
            <option value="48">Médio (48pt)</option>
            <option value="64">Grande (64pt)</option>
            <option value="80">Muito grande (80pt)</option>
          </select>
        </div>
        <div className="field"><label>Opacidade</label>
          <select value={opacity} onChange={e=>setOpacity(e.target.value)}>
            <option value="0.08">Muito sutil (8%)</option>
            <option value="0.15">Sutil (15%)</option>
            <option value="0.25">Moderado (25%)</option>
            <option value="0.40">Visível (40%)</option>
          </select>
        </div>
        <div className="field"><label>Cor do texto</label><input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{height:48,padding:'4px 6px',cursor:'pointer'}}/></div>
      </div>
      <div className="wm-preview" style={{color:color,opacity:parseFloat(opacity)+.3,fontSize:`${Math.min(parseInt(size),40)}px`}}>{text||'Pré-visualização'}</div>
      <div className="action-area">
        <button className="btn btn-blue" onClick={apply} disabled={loading||!text.trim()}>
          {loading?<><span className="spin"></span>Aplicando…</>:"💧 Aplicar Marca D'água"}
        </button>
      </div>
      {msg&&<div className={`alert ${msg.t}`}>{msg.s}</div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════════════ */
const TOOLS=[
  {id:'merge',  icon:'🔗',title:'Juntar PDFs',      desc:'Una múltiplos PDFs e imagens com nome automático baseado nos dados do documento.'},
  {id:'split',  icon:'✂️',title:'Dividir PDF',       desc:'Extraia páginas individuais ou baixe um conjunto de páginas como arquivo ZIP.'},
  {id:'compress',icon:'📦',title:'Comprimir PDF',    desc:'Reduza o tamanho do arquivo PDF. Escolha entre 3 níveis de compressão.'},
  {id:'protect', icon:'🔒',title:'Proteger PDF',     desc:'Adicione senha e restrições de acesso (impressão, cópia, edição) ao PDF.'},
  {id:'rotate',  icon:'🔄',title:'Rotacionar PDF',   desc:'Gire todas as páginas do documento em 90°, 180° ou 270°.'},
  {id:'convert', icon:'🖼️',title:'PDF → Imagens',   desc:'Converta cada página em JPEG de alta resolução. Download individual ou em ZIP.'},
  {id:'watermark',icon:'💧',title:"Marca D'água",    desc:"Adicione texto diagonal (ex: CONFIDENCIAL) em todas as páginas do PDF."},
];

function Dashboard({setTool}){
  return(
    <div className="grid">
      {TOOLS.map(t=>(
        <div key={t.id} className="card" onClick={()=>setTool(t.id)}>
          <div className="icon">{t.icon}</div>
          <h3>{t.title}</h3>
          <p>{t.desc}</p>
          <span className="tag">disponível</span>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════════ */
const TOOL_LABELS={merge:'Juntar PDFs',split:'Dividir PDF',compress:'Comprimir PDF',protect:'Proteger PDF',rotate:'Rotacionar PDF',convert:'PDF → Imagens',watermark:"Marca D'água"};

function App(){
  const[tool,setTool]=useState(null);

  useEffect(()=>{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  },[]);

  return(<>
    <header>
      <div className="container header-content">
        <div className="logo-area" onClick={()=>setTool(null)}>
          <div className="logo-img-wrap"><img src={LOGO} alt="Pro Imagem"/></div>
          <div className="logo-text">
            <h1>UNI<span>DOC</span></h1>
            <p>Plataforma profissional de PDFs</p>
          </div>
        </div>
        {tool&&(
          <div className="nav-back">
            <div className="breadcrumb">
              <b onClick={()=>setTool(null)}>🏠 Início</b>
              <span>›</span>
              <span>{TOOL_LABELS[tool]}</span>
            </div>
            <button className="btn btn-sm" style={{marginLeft:12}} onClick={()=>setTool(null)}>← Voltar</button>
          </div>
        )}
      </div>
    </header>

    {!tool&&(
      <section className="hero">
        <h2>Plataforma <span>Profissional</span> de PDFs</h2>
        <p>7 ferramentas para juntar, dividir, proteger, comprimir, converter e organizar seus documentos. Gratuito e 100% no navegador.</p>
      </section>
    )}

    <main className="container">
      {!tool&&<Dashboard setTool={setTool}/>}
      {tool==='merge'&&<MergeTool/>}
      {tool==='split'&&<SplitTool/>}
      {tool==='compress'&&<CompressTool/>}
      {tool==='protect'&&<ProtectTool/>}
      {tool==='rotate'&&<RotateTool/>}
      {tool==='convert'&&<ConvertTool/>}
      {tool==='watermark'&&<WatermarkTool/>}
    </main>

    <footer>
      <p>© {new Date().getFullYear()} <strong>UNIDOC</strong> — Pro Imagem Exames e Consultas</p>
      <p>Desenvolvido por <strong>Carlos Henrique</strong> · Processamento 100% local · Nenhum dado enviado a servidores</p>
    </footer>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
