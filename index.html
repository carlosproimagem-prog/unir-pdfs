<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDFusion — Pro Imagem</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- Atualizado para Montserrat para combinar com a tipografia geométrica da logo -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Paleta PRO IMAGEM */
  --brand-blue: #244677;    /* Azul Escuro (IMAGEM) */
  --brand-cyan: #009dda;    /* Azul Claro/Ciano (Globo) */
  --brand-orange: #f26f21;  /* Laranja (PRO) */
  --brand-dark: #58595b;    /* Cinza Escuro (EXAMES E CONSULTAS) */

  /* Estrutura Light Mode Clínico */
  --bg: #f4f7fa;
  --surface: #ffffff;
  --s2: #f8fafc;
  --s3: #f1f5f9;
  
  --border: #e2e8f0;
  --border2: #cbd5e1;
  
  --text: #334155;
  --heading: var(--brand-blue);
  --muted: #64748b;
  
  --accent: var(--brand-orange);
  --accent-h: rgba(242, 111, 33, 0.08);
  --accent2: var(--brand-cyan);
  
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  
  --r: 12px;
  --font: 'Montserrat', sans-serif;
  --body: 'Inter', sans-serif;
  --shadow: 0 4px 24px rgba(36, 70, 119, 0.06);
}

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
#root { min-height: 100vh; }

/* Fundo sutil para não ficar apenas branco/cinza liso */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0, 157, 218, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 10% 90%, rgba(242, 111, 33, 0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* SPLASH SCREEN */
.splash { position:fixed; inset:0; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:999; }
.splash-wordmark { font-family:var(--font); font-size:2.8rem; font-weight:800; color:var(--brand-orange); letter-spacing:-1px; text-transform: uppercase; }
.splash-wordmark em { font-style:normal; color:var(--brand-blue); }
.splash-track { width:180px; height:4px; background:var(--s3); border-radius:4px; overflow:hidden; }
.splash-fill { height:100%; background:var(--brand-cyan); animation:load 2.5s ease-in-out forwards; width:0; }
@keyframes load { to { width:100%; } }
.splash-sub { color:var(--muted); font-size:.85rem; letter-spacing:.5px; font-weight: 500; }

/* APP */
.app { position:relative; z-index:1; max-width:1120px; margin:0 auto; padding:40px 20px 64px; }

/* HEADER */
.hdr { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:44px; }
.wordmark { font-family:var(--font); font-size:2.4rem; font-weight:900; letter-spacing:-1px; color:var(--brand-orange); text-transform: uppercase; line-height: 1; }
.wordmark em { font-style:normal; color:var(--brand-blue); }
.hdr-sub { color:var(--brand-dark); font-size:.9rem; margin-top:6px; font-weight: 500; }
.badge { background:rgba(0, 157, 218, 0.08); border:1px solid rgba(0, 157, 218, 0.2); padding:6px 14px; border-radius:100px; font-size:.75rem; color:var(--brand-blue); display:flex; align-items:center; gap:8px; font-weight: 600; }
.badge-dot { width:8px; height:8px; border-radius:50%; background:var(--brand-cyan); box-shadow:0 0 8px rgba(0, 157, 218, 0.5); }

/* GRID */
.grid { display:grid; grid-template-columns:360px 1fr; gap:24px; align-items:start; }
@media(max-width:820px) { .grid { grid-template-columns:1fr; } }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); }
.ch { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.ch-ic { width:36px; height:36px; border-radius:10px; background:rgba(0, 157, 218, 0.1); color:var(--brand-cyan); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.ch-title { font-family:var(--font); font-size:1.05rem; font-weight:700; color:var(--heading); }
.ch-sub { font-size:.75rem; color:var(--muted); margin-top:2px; }
.cb { padding:24px; }

/* DROPZONE */
.drop { border:2px dashed var(--border2); border-radius:10px; padding:36px 20px; text-align:center; cursor:pointer; transition:.2s; background:var(--surface); position:relative; }
.drop:hover { border-color:var(--brand-orange); background:var(--accent-h); }
.drop input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-ic { font-size:2.4rem; display:block; margin-bottom:12px; color: var(--brand-cyan); transition: .2s; }
.drop:hover .drop-ic { color: var(--brand-orange); transform: translateY(-3px); }
.drop-txt { font-size:.85rem; color:var(--muted); line-height:1.6; }
.drop-txt strong { color:var(--brand-blue); font-weight:600; font-size: .9rem; }
.drop:hover .drop-txt strong { color: var(--brand-orange); }

/* DIVIDER */
.div { height:1px; background:var(--border); margin:24px 0; }

/* FORM */
.fl { font-size:.75rem; font-weight:600; color:var(--brand-blue); margin-bottom:6px; display:block; text-transform:uppercase; letter-spacing:.5px; }
.fi { width:100%; padding:11px 14px; background:var(--surface); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:.9rem; font-family:var(--body); outline:none; transition:.2s; margin-bottom:16px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); }
.fi:focus { border-color:var(--brand-cyan); box-shadow:0 0 0 3px rgba(0, 157, 218, 0.15); }
.fi::placeholder { color:#94a3b8; }
.fi.ok { border-color:var(--green); background:rgba(16, 185, 129, 0.03); }

/* DETECT STRIP */
.ds { background:rgba(16, 185, 129, 0.06); border:1px solid rgba(16, 185, 129, 0.2); border-radius:8px; padding:12px 14px; margin-bottom:20px; font-size:.8rem; color:var(--green); display:flex; align-items:flex-start; gap:8px; line-height:1.5; font-weight: 500; }

/* FILENAME BOX */
.fnbox { background:rgba(36, 70, 119, 0.03); border:1px solid rgba(36, 70, 119, 0.1); border-left:4px solid var(--brand-blue); border-radius:8px; padding:14px 16px; }
.fnlabel { font-size:.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:700; margin-bottom:8px; font-family: var(--font); }
.fnval { font-family:monospace; font-size:.85rem; color:var(--brand-orange); word-break:break-all; line-height:1.55; font-weight: 600; }
.fnempty { font-size:.8rem; color:var(--muted); font-style:italic; }

/* ALERTS */
.al { padding:12px 14px; border-radius:8px; font-size:.85rem; margin-top:16px; display:flex; gap:8px; align-items:flex-start; line-height:1.5; font-weight: 500; }
.al-e { background:rgba(239, 68, 68, 0.08); border:1px solid rgba(239, 68, 68, 0.2); color:#b91c1c; }
.al-s { background:rgba(16, 185, 129, 0.08); border:1px solid rgba(16, 185, 129, 0.2); color:#047857; }

/* PREVIEW GRID */
.pv-wrap { min-height:300px; background:var(--s2); border: 1px solid var(--border); border-radius:10px; padding:16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:16px; max-height:560px; overflow-y:auto; }
.pv-wrap::-webkit-scrollbar { width:6px; }
.pv-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:6px; }
.empty { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 0; color:var(--muted); gap:12px; }
.empty-ic { font-size:3rem; opacity:.3; filter: grayscale(1); }
.empty-tx { font-size:.9rem; text-align:center; line-height:1.6; font-weight: 500; }

/* PAGE CARD */
.pc { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:grab; transition:.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
.pc:hover { border-color:var(--brand-cyan); box-shadow:0 6px 16px rgba(0, 157, 218, 0.12); transform:translateY(-2px); }
.pc.drag { opacity:.4; transform:scale(.95); border-color: var(--brand-orange); }
.pc-thumb { width:100%; height:115px; display:flex; align-items:center; justify-content:center; background:var(--s3); overflow:hidden; padding: 4px; }
.pc-thumb img, .pc-thumb canvas { max-width:100%; max-height:100%; object-fit:contain; border: 1px solid var(--border); background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.pc-name { padding:8px; border-top:1px solid var(--border); font-size:.68rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight: 500; background: var(--surface); }
.pc-num { position:absolute; top:6px; left:6px; background:var(--brand-blue); color:#fff; font-size:.65rem; font-weight:700; padding:3px 8px; border-radius:5px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 2; }
.pc-del { position:absolute; top:6px; right:6px; background:var(--surface); color:var(--red); border:1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.1); border-radius:5px; width:24px; height:24px; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:.8rem; transition:.15s; z-index: 2; }
.pc-del:hover { background:var(--red); color:#fff; border-color: var(--red); }
.pc:hover .pc-del { display:flex; }

/* BOTTOM BAR */
.bot { margin-top:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.pg-count { font-size:.85rem; color:var(--muted); }
.pg-count strong { color:var(--brand-blue); font-weight:700; font-size: .95rem; }
.btn-clr { background:none; border:1px solid var(--border2); color:var(--text); padding:9px 16px; border-radius:8px; font-size:.85rem; font-weight: 500; cursor:pointer; font-family:var(--body); transition:.15s; }
.btn-clr:hover { border-color:var(--red); color:var(--red); background: rgba(239, 68, 68, 0.05); }

/* PRIMARY BUTTON */
.btn-gen { background:var(--brand-orange); border:none; color:#fff; padding:12px 32px; border-radius:8px; font-family:var(--font); font-size:.95rem; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:8px; box-shadow:0 4px 14px rgba(242, 111, 33, 0.3); text-transform: uppercase; letter-spacing: .5px; }
.btn-gen:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 22px rgba(242, 111, 33, 0.4); background: #e06117; }
.btn-gen:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; filter: grayscale(0.5); }

/* SPINNER */
.spin { width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin-dark { border-color: rgba(36, 70, 119, 0.1); border-top-color: var(--brand-blue); }

/* LOADING LINE */
.ldline { display:flex; align-items:center; justify-content: center; gap:8px; margin-top:16px; font-size:.85rem; color:var(--brand-blue); font-weight: 500; }

/* FOOTER */
footer { text-align:center; margin-top:64px; color:var(--muted); font-size:.8rem; padding-bottom:24px; font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── Smart auto-parser from filenames (no AI) ─────────────────────────── */
function smartParse(files) {
  const names  = files.map(f => f.name).join(' ');
  const result = { data: '', prestador: '', valor: '' };

  // ── Date ──
  const datePats = [
    { re: /(\d{2})[.\-_\/](\d{2})[.\-_\/](\d{4})/, fn: m => `${m[1]}.${m[2]}.${m[3].slice(2)}` },
    { re: /(\d{2})[.\-_\/](\d{2})[.\-_\/](\d{2})(?!\d)/, fn: m => `${m[1]}.${m[2]}.${m[3]}` },
    { re: /(\d{4})(\d{2})(\d{2})(?!\d)/, fn: m => `${m[3]}.${m[2]}.${m[1].slice(2)}` },
  ];
  for (const { re, fn } of datePats) {
    const m = names.match(re);
    if (m) { result.data = fn(m); break; }
  }

  // ── Value ──
  const valPats = [
    /[Rr]\$\s*([\d]{1,3}(?:[.,]\d{3})*[.,]\d{2})/,
    /[Rr]\$\s*(\d+[.,]\d{2})/,
    /(\d{1,3}(?:\.\d{3})+,\d{2})/,
    /(\d+,\d{2})(?!\d)/,
  ];
  for (const re of valPats) {
    const m = names.match(re);
    if (m) {
      let v = m[1].replace(/\./g,'').replace(',','.');
      result.valor = `R$ ${v}`;
      break;
    }
  }

  // ── Provider: capitalized words not in stoplist ──
  const stop = new Set(['boleto','comprovante','nota','fiscal','recibo','pagamento','pago','pdf',
    'jpg','png','scan','arquivo','documento','file','the','and','para','com','por','de','do','da',
    'em','no','na','os','as','um','uma','mes','ref','ref','pg','pg','pag','num','nf','nfe']);
  const candidates = files.flatMap(f =>
    f.name.replace(/\.[^.]+$/, '').replace(/[_\-\.]/g,' ').split(/\s+/)
      .filter(w => w.length >= 3 && /^[A-ZÁÉÍÓÚÂÊÎÔÛÃÕ]/i.test(w) && !/^\d/.test(w) && !stop.has(w.toLowerCase()))
  );
  const unique = [...new Set(candidates)];
  if (unique.length) result.prestador = unique.slice(0,3).join(' ');

  return result;
}

/* ─── Page thumbnail card ───────────────────────────────────────────────── */
function PageCard({ page, index, isDragging, onDelete, onDragStart, onDragOver, onDrop, onDragEnd }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (page.type === 'pdf' && page.pdfDoc && canvasRef.current) {
      (async () => {
        try {
          const pg = await page.pdfDoc.getPage(page.pageNumber);
          const vp = pg.getViewport({ scale: 1.5 });
          const ctx = canvasRef.current.getContext('2d');
          canvasRef.current.width  = vp.width;
          canvasRef.current.height = vp.height;
          await pg.render({ canvasContext: ctx, viewport: vp }).promise;
        } catch {}
      })();
    }
  }, [page]);

  return (
    <div
      className={`pc${isDragging ? ' drag' : ''}`}
      draggable
      onDragStart={e => onDragStart(e, index)}
      onDragOver={e => onDragOver(e, index)}
      onDrop={onDrop} onDragEnd={onDragEnd}
    >
      <div className="pc-thumb">
        {page.type === 'image'
          ? <img src={page.dataUrl} alt="" />
          : <canvas ref={canvasRef}></canvas>}
      </div>
      <span className="pc-num">{index + 1}</span>
      <button className="pc-del" onClick={() => onDelete(page.id)} title="Remover página">✕</button>
      <div className="pc-name" title={page.file.name}>
        {page.file.name}{page.type === 'pdf' ? ` · p.${page.pageNumber}` : ''}
      </div>
    </div>
  );
}

/* ─── Main ──────────────────────────────────────────────────────────────── */
function App() {
  const [ready,   setReady]   = useState(false);
  const [pages,   setPages]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [dragged, setDragged] = useState(null);
  const [error,   setError]   = useState('');
  const [ok,      setOk]      = useState('');
  const [detected,setDetected]= useState(false);
  const [meta, setMeta] = useState({ data:'', tipo:'BOLETO E COMPROVANTE', prestador:'', valor:'' });

  // Wait for CDN libs
  useEffect(() => {
    let n = 0;
    const t = setInterval(() => {
      n++;
      if (window.pdfjsLib && window.PDFLib) {
        clearInterval(t);
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        setReady(true);
      }
      if (n > 60) { clearInterval(t); setError('Erro ao carregar bibliotecas. Recarregue a página.'); setReady(true); }
    }, 100);
    return () => clearInterval(t);
  }, []);

  // Computed filename
  const d = meta.data.replace(/[^0-9.]/g,'') || 'SemData';
  const t2 = meta.tipo.replace(/[^a-zA-Z0-9\s]/g,'_').trim() || 'Documento';
  const pr = meta.prestador.replace(/[^a-zA-Z0-9\s]/g,'').trim() || 'SemPrestador';
  const vl = meta.valor.replace(/[^\w$.\s]/g,'').trim() || 'SemValor';
  const filename = `${d} ${t2} ${pr} ${vl}.pdf`;
  const hasFilename = meta.data && meta.prestador && meta.valor;

  // Process files
  const handleFiles = async (files) => {
    if (!window.pdfjsLib) { setError('Aguarde o carregamento das bibliotecas.'); return; }
    setLoading(true); setError(''); setOk('');
    const parsed = smartParse(files);
    if (parsed.data || parsed.prestador || parsed.valor) {
      setDetected(true);
      setMeta(prev => ({
        ...prev,
        data:      parsed.data      || prev.data,
        prestador: parsed.prestador || prev.prestador,
        valor:     parsed.valor     || prev.valor,
      }));
    }
    const results = [];
    for (const file of files) {
      try {
        if (file.type.startsWith('image/')) {
          const dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.onerror = () => rej();
            r.readAsDataURL(file);
          });
          results.push({ id: `${file.name}-${Date.now()}-${Math.random()}`, type:'image', file, dataUrl });
        } else if (file.type === 'application/pdf') {
          const buf = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
          for (let i = 1; i <= pdf.numPages; i++)
            results.push({ id:`${file.name}-${Date.now()}-${Math.random()}-${i}`, type:'pdf', file, pdfDoc:pdf, pageNumber:i });
        } else {
          setError(`Tipo não suportado: ${file.name}`);
        }
      } catch(e) { setError(`Erro em ${file.name}: ${e.message}`); }
    }
    setPages(prev => [...prev, ...results]);
    setLoading(false);
  };

  // Drag-to-reorder
  const onDragStart = (e, i) => setDragged(pages[i]);
  const onDragOver  = (e, i) => {
    e.preventDefault();
    if (!dragged || dragged.id === pages[i].id) return;
    const arr = [...pages], from = arr.findIndex(p => p.id === dragged.id);
    const [it] = arr.splice(from, 1); arr.splice(i, 0, it); setPages(arr);
  };
  const onDrop  = e => { e.preventDefault(); setDragged(null); };
  const onDragEnd   = () => setDragged(null);
  const onDelete    = id => setPages(prev => prev.filter(p => p.id !== id));

  // Generate PDF
  const generate = async () => {
    if (!window.PDFLib || pages.length === 0) return;
    setLoading(true); setError(''); setOk('');
    try {
      const { PDFDocument } = window.PDFLib;
      const doc = await PDFDocument.create();
      for (const pg of pages) {
        if (pg.type === 'image') {
          const bytes = await fetch(pg.dataUrl).then(r => r.arrayBuffer());
          const img = pg.file.type === 'image/jpeg' ? await doc.embedJpg(bytes) : await doc.embedPng(bytes);
          const page = doc.addPage();
          const { width, height } = page.getSize();
          const dims = img.scaleToFit(width - 40, height - 40);
          page.drawImage(img, { x:(width-dims.width)/2, y:(height-dims.height)/2, ...dims });
        } else if (pg.type === 'pdf') {
          const bytes = await pg.file.arrayBuffer();
          const src   = await PDFDocument.load(bytes);
          const [cp]  = await doc.copyPages(src, [pg.pageNumber - 1]);
          doc.addPage(cp);
        }
      }
      const bytes = await doc.save();
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([bytes], { type:'application/pdf' })),
        download: filename
      });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      setOk(`PDF salvo com sucesso: "${filename}"`);
    } catch(e) { setError(`Erro ao gerar PDF: ${e.message}`); }
    finally     { setLoading(false); }
  };

  if (!ready) return (
    <div className="splash">
      <div className="splash-wordmark">PDF<em>fusion</em></div>
      <div className="splash-track"><div className="splash-fill"></div></div>
      <div className="splash-sub">Carregando ambiente seguro...</div>
    </div>
  );

  const fileCount = [...new Set(pages.map(p => p.file.name))].length;

  return (
    <div className="app">
      <header className="hdr">
        <div>
          <div className="wordmark">PDF<em>fusion</em></div>
          <div className="hdr-sub">Una, organize e nomeie documentos de forma rápida e segura</div>
        </div>
        <div className="badge"><span className="badge-dot"></span>Processamento 100% Local</div>
      </header>

      <div className="grid">
        {/* LEFT PANEL */}
        <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>

          <div className="card">
            <div className="ch"><div className="ch-ic">
              <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
            </div>
              <div><div className="ch-title">Adicionar Arquivos</div><div className="ch-sub">Selecione PDFs, JPG ou PNG</div></div>
            </div>
            <div className="cb">
              <label>
                <div className="drop">
                  <span className="drop-ic">
                    <svg width="40" height="40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24" style={{margin:'0 auto'}}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                  </span>
                  <div className="drop-txt"><strong>Clique para selecionar</strong><br/>ou arraste os arquivos aqui</div>
                  <input type="file" multiple accept="image/jpeg,image/png,application/pdf" onChange={e => handleFiles(Array.from(e.target.files))} />
                </div>
              </label>
              {loading && <div className="ldline"><span className="spin spin-dark"></span>Processando arquivos...</div>}
            </div>
          </div>

          <div className="card">
            <div className="ch"><div className="ch-ic">
              <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </div>
              <div><div className="ch-title">Detalhes do Documento</div><div className="ch-sub">Defina os dados para o nome final</div></div>
            </div>
            <div className="cb">
              {detected && (
                <div className="ds">
                  <span style={{fontSize:'1.1rem'}}>✓</span>
                  <span>Dados detectados automaticamente dos arquivos inseridos. Confira e ajuste se necessário.</span>
                </div>
              )}

              <label className="fl">Data de Pagamento / Emissão</label>
              <input className={`fi${meta.data?' ok':''}`} type="text" value={meta.data} onChange={e=>setMeta(p=>({...p,data:e.target.value}))} placeholder="Ex: 05.12.25" />

              <label className="fl">Tipo de Documento</label>
              <input className="fi" type="text" value={meta.tipo} onChange={e=>setMeta(p=>({...p,tipo:e.target.value}))} placeholder="BOLETO E COMPROVANTE" />

              <label className="fl">Prestador / Beneficiário</label>
              <input className={`fi${meta.prestador?' ok':''}`} type="text" value={meta.prestador} onChange={e=>setMeta(p=>({...p,prestador:e.target.value}))} placeholder="Ex: Unimed, Eletrobras" />

              <label className="fl">Valor</label>
              <input className={`fi${meta.valor?' ok':''}`} type="text" value={meta.valor} onChange={e=>setMeta(p=>({...p,valor:e.target.value}))} placeholder="Ex: R$ 123.45" />

              <div className="div"></div>
              <div className="fnbox">
                <div className="fnlabel">Nome do arquivo gerado</div>
                {hasFilename
                  ? <div className="fnval">{filename}</div>
                  : <div className="fnempty">Preencha os campos para visualizar o nome</div>}
              </div>

              {error && <div className="al al-e"><span style={{fontWeight:'bold'}}>!</span><span>{error}</span></div>}
              {ok    && <div className="al al-s"><span style={{fontWeight:'bold'}}>✓</span><span>{ok}</span></div>}
            </div>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="card" style={{position:'sticky',top:24}}>
          <div className="ch"><div className="ch-ic">
            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
          </div>
            <div><div className="ch-title">Organizar Páginas</div><div className="ch-sub">Arraste para reordenar · Clique no "X" para excluir</div></div>
          </div>
          <div className="cb">
            <div className="pv-wrap">
              {pages.length === 0
                ? <div className="empty">
                    <div className="empty-ic">
                      <svg width="48" height="48" fill="none" stroke="currentColor" strokeWidth="1" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div className="empty-tx">Nenhuma página adicionada.<br/>Selecione arquivos ao lado.</div>
                  </div>
                : pages.map((pg, i) => (
                    <PageCard key={pg.id} page={pg} index={i}
                      isDragging={dragged?.id === pg.id}
                      onDelete={onDelete}
                      onDragStart={onDragStart} onDragOver={onDragOver}
                      onDrop={onDrop} onDragEnd={onDragEnd}
                    />
                  ))
              }
            </div>

            <div className="bot">
              <span className="pg-count">
                <strong>{pages.length}</strong> página{pages.length!==1?'s':''}
                {fileCount > 0 && <span> · {fileCount} arquivo{fileCount!==1?'s':''}</span>}
              </span>
              <div style={{display:'flex',gap:12}}>
                {pages.length > 0 &&
                  <button className="btn-clr" onClick={()=>{setPages([]);setDetected(false);setOk('');setError('')}}>Limpar Tudo</button>}
                <button className="btn-gen" onClick={generate} disabled={pages.length===0||loading}>
                  {loading
                    ? <><span className="spin"></span>Gerando...</>
                    : <><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/></svg>Salvar PDF</>}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <footer>PDFusion para Pro Imagem · Processamento 100% local e seguro no seu navegador</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
