
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIDOC — Pro Imagem</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --primary:#005c53;
  --secondary:#9fc131;
  --accent:#dbf227;
  --bg:#f4f7f6;
  --text:#1c2826;
  --muted:#57606f;
  --border:#e4e7eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

header{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:1000;
}

.container{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  font-size:1.6rem;
  font-weight:700;
  color:var(--primary);
}

.logo span{
  color:var(--secondary);
}

.hero{
  background:linear-gradient(135deg,var(--primary),#003d37);
  color:#fff;
  padding:50px 20px;
  text-align:center;
}

.hero h1{
  font-size:2.2rem;
  margin-bottom:10px;
}

.hero p{
  opacity:.9;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  padding:24px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.card h3{
  margin-top:12px;
  color:var(--primary);
}

.tool-box{
  background:#fff;
  border-radius:14px;
  border:1px solid var(--border);
  padding:24px;
  margin-top:30px;
}

.dropzone{
  border:2px dashed #cbd5e1;
  border-radius:12px;
  padding:40px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.dropzone:hover{
  border-color:var(--primary);
  background:rgba(0,92,83,.03);
}

.pages{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;
  margin-top:25px;
}

.page-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}

.page-card canvas{
  width:100%;
  border-radius:6px;
}

.actions{
  margin-top:30px;
  display:grid;
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field input,
.field select{
  height:44px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:0 12px;
}

.btn{
  height:48px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.btn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.alert{
  margin-top:15px;
  padding:12px;
  border-radius:8px;
  font-size:.9rem;
}

.error{
  background:#fef2f2;
  color:#991b1b;
}

.success{
  background:#ecfdf5;
  color:#166534;
}

footer{
  margin-top:50px;
  background:#fff;
  border-top:1px solid var(--border);
  padding:30px 20px;
  text-align:center;
  color:var(--muted);
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

function parseDate(text){
  const match = text.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{4}/);
  return match ? match[0].replace(/[-.]/g,'/') : '';
}

function parseValue(text){
  const match = text.match(/(?:R\$\s?)?(\d{1,3}(?:\.\d{3})*,\d{2})/);
  return match ? match[1] : '';
}

function parsePrestador(text){
  const providers = [
    'ENERGISA',
    'DESO',
    'CLARO',
    'VIVO',
    'TIM',
    'ITAU',
    'BRADESCO',
    'CAIXA',
    'SANTANDER'
  ];

  return providers.find(p => text.toUpperCase().includes(p)) || '';
}

async function extractText(file){
  try{
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

    let text = '';

    for(let i = 1; i <= Math.min(pdf.numPages,2); i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      text += content.items.map(i => i.str).join(' ');
    }

    return text;

  }catch(error){
    console.error(error);
    return '';
  }
}

function PagePreview({page}){

  const canvasRef = useRef(null);

  useEffect(()=>{

    async function renderPage(){

      try{

        const buffer = await page.file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

        const pdfPage = await pdf.getPage(page.pageIndex + 1);

        const viewport = pdfPage.getViewport({scale:0.35});

        const canvas = canvasRef.current;

        const context = canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await pdfPage.render({
          canvasContext:context,
          viewport
        }).promise;

      }catch(error){
        console.error(error);
      }
    }

    renderPage();

  },[]);

  return (
    <div className="page-card">
      <canvas ref={canvasRef}></canvas>
      <small>{page.file.name}</small>
    </div>
  )
}

function MergeTool(){

  const [pages,setPages] = useState([]);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [success,setSuccess] = useState('');

  const [meta,setMeta] = useState({
    data:'',
    tipo:'BOLETO',
    prestador:'',
    valor:''
  });

  async function handleFiles(event){

    const files = Array.from(
      event.target.files || event.dataTransfer.files
    );

    setError('');
    setSuccess('');

    const newPages = [];

    try{

      for(const file of files){

        if(file.type !== 'application/pdf'){
          setError('Envie apenas arquivos PDF.');
          continue;
        }

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
          data:buffer
        }).promise;

        for(let i = 0; i < pdf.numPages; i++){

          newPages.push({
            id: crypto.randomUUID(),
            file,
            pageIndex:i
          });
        }

        const text = await extractText(file);

        setMeta(prev => ({
          ...prev,
          data: prev.data || parseDate(text),
          valor: prev.valor || parseValue(text),
          prestador: prev.prestador || parsePrestador(text)
        }));
      }

      setPages(prev => [...prev,...newPages]);

    }catch(error){
      console.error(error);
      setError('Erro ao processar o PDF.');
    }
  }

  function buildName(){

    const parts = [];

    if(meta.data) parts.push(meta.data);
    if(meta.tipo) parts.push(meta.tipo);
    if(meta.prestador) parts.push(meta.prestador);
    if(meta.valor) parts.push(`R$ ${meta.valor}`);

    return parts.join(' - ') + '.pdf';
  }

  async function generatePDF(){

    try{

      setLoading(true);

      const pdfDoc = await PDFLib.PDFDocument.create();

      for(const page of pages){

        const buffer = await page.file.arrayBuffer();

        const sourcePdf = await PDFLib.PDFDocument.load(buffer);

        const [copiedPage] = await pdfDoc.copyPages(
          sourcePdf,
          [page.pageIndex]
        );

        pdfDoc.addPage(copiedPage);
      }

      const bytes = await pdfDoc.save();

      const blob = new Blob([bytes],{
        type:'application/pdf'
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');

      a.href = url;
      a.download = buildName();

      a.click();

      URL.revokeObjectURL(url);

      setSuccess('PDF gerado com sucesso!');

    }catch(error){

      console.error(error);

      setError('Erro ao gerar PDF.');

    }finally{

      setLoading(false);
    }
  }

  return(
    <div className="tool-box">

      <h2>Juntar PDF</h2>

      <div
        className="dropzone"
        onDragOver={(e)=>e.preventDefault()}
        onDrop={(e)=>{
          e.preventDefault();
          handleFiles(e);
        }}
        onClick={()=>document.getElementById('pdf-input').click()}
      >

        <h3>📂 Arraste seus PDFs aqui</h3>

        <p>ou clique para selecionar arquivos</p>

        <input
          id="pdf-input"
          type="file"
          accept=".pdf"
          multiple
          hidden
          onChange={handleFiles}
        />
      </div>

      {error && <div className="alert error">{error}</div>}
      {success && <div className="alert success">{success}</div>}

      {pages.length > 0 && (
        <>

          <div className="pages">
            {pages.map(page=>(
              <PagePreview key={page.id} page={page}/>
            ))}
          </div>

          <div className="actions">

            <div className="field">
              <label>Data</label>
              <input
                value={meta.data}
                onChange={(e)=>setMeta({
                  ...meta,
                  data:e.target.value
                })}
              />
            </div>

            <div className="field">
              <label>Tipo</label>

              <select
                value={meta.tipo}
                onChange={(e)=>setMeta({
                  ...meta,
                  tipo:e.target.value
                })}
              >
                <option>BOLETO</option>
                <option>NOTA FISCAL</option>
                <option>COMPROVANTE</option>
                <option>RELATORIO</option>
              </select>
            </div>

            <div className="field">
              <label>Prestador</label>

              <input
                value={meta.prestador}
                onChange={(e)=>setMeta({
                  ...meta,
                  prestador:e.target.value
                })}
              />
            </div>

            <div className="field">
              <label>Valor</label>

              <input
                value={meta.valor}
                onChange={(e)=>setMeta({
                  ...meta,
                  valor:e.target.value
                })}
              />
            </div>

            <div className="field">
              <label>Nome Final</label>
              <input value={buildName()} readOnly/>
            </div>

            <button
              className="btn"
              onClick={generatePDF}
              disabled={loading}
            >
              {loading ? 'Gerando PDF...' : 'Gerar PDF'}
            </button>

          </div>

        </>
      )}

    </div>
  )
}

function Dashboard({setTool}){

  const tools = [
    {
      id:'merge',
      title:'Juntar PDF',
      icon:'📄',
      desc:'Combine vários PDFs'
    },
    {
      id:'split',
      title:'Dividir PDF',
      icon:'✂️',
      desc:'Separe páginas'
    },
    {
      id:'compress',
      title:'Comprimir PDF',
      icon:'📉',
      desc:'Reduza tamanho'
    }
  ];

  return(
    <div className="grid">

      {tools.map(tool=>(
        <div
          key={tool.id}
          className="card"
          onClick={()=>setTool(tool.id)}
        >

          <div style={{fontSize:'2rem'}}>{tool.icon}</div>

          <h3>{tool.title}</h3>

          <p>{tool.desc}</p>

        </div>
      ))}

    </div>
  )
}

function App(){

  const [tool,setTool] = useState(null);

  useEffect(()=>{

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  },[]);

  return(
    <>

      <header>

        <div className="container header-content">

          <div className="logo">
            Pro Imagem <span>UNIDOC</span>
          </div>

          {tool && (
            <button
              className="btn"
              style={{width:'180px'}}
              onClick={()=>setTool(null)}
            >
              Voltar
            </button>
          )}

        </div>

      </header>

      <section className="hero">

        <h1>
          Plataforma de PDFs
        </h1>

        <p>
          Processamento local, rápido e seguro.
        </p>

      </section>

      <main className="container">

        {!tool && <Dashboard setTool={setTool}/>}

        {tool === 'merge' && <MergeTool/>}

        {tool === 'split' && (
          <div className="tool-box">
            <h2>Dividir PDF</h2>
            <p>Ferramenta em desenvolvimento.</p>
          </div>
        )}

        {tool === 'compress' && (
          <div className="tool-box">
            <h2>Comprimir PDF</h2>
            <p>Ferramenta em desenvolvimento.</p>
          </div>
        )}

      </main>

      <footer>
        © 2026 UNIDOC — Pro Imagem Exames e Consultas
      </footer>

    </>
  )
}

ReactDOM.createRoot(
  document.getElementById('root')
).render(<App/>);

</script>

</body>
</html>
