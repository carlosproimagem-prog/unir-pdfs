<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIDOC — Pro Imagem</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#f5821f;--or-d:#d96a0a;--or-l:#fef3e8;--or-m:#fde0c0;
  --bl:#1a4e8f;--bl-d:#0f3366;--bl-l:#eef3fb;--bl-m:#c5d6ef;--bl-mid:#2e7cc4;
  --bg:#f2f5fb;--white:#fff;--sf:#f8fafd;
  --brd:#dde3f0;--brd2:#c8d3e8;
  --tx:#1a2340;--mt:#6b7694;--mt2:#9aa3bc;
  --gn:#16a34a;--rd:#dc2626;--yw:#d97706;
  --r:13px;--fn:'Syne',sans-serif;--bd:'Inter',sans-serif;
  --sh:0 2px 12px rgba(26,78,143,.09);
  --sh2:0 6px 28px rgba(26,78,143,.13);
}
body{font-family:var(--bd);background:var(--bg);color:var(--tx);min-height:100vh}
#root{min-height:100vh;display:flex;flex-direction:column}

/* SPLASH */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:999;background:linear-gradient(150deg,var(--bl-d) 0%,var(--bl) 55%,var(--bl-mid) 100%)}
.sp-logo{height:72px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.25))}
.sp-name{font-family:var(--fn);font-size:2.2rem;font-weight:800;color:#fff;letter-spacing:-1px}
.sp-name span{color:var(--or)}
.sp-track{width:160px;height:3px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.sp-bar{height:100%;background:linear-gradient(90deg,var(--or),#ffb347);animation:ld 2.6s ease-in-out forwards;width:0}
@keyframes ld{to{width:100%}}
.sp-sub{color:rgba(255,255,255,.5);font-size:.75rem;letter-spacing:.8px;text-transform:uppercase}

/* TOPBAR */
.topbar{background:linear-gradient(100deg,var(--bl-d) 0%,var(--bl) 60%,var(--bl-mid) 100%);height:62px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 18px rgba(26,78,143,.28);position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:18px}
.tb-logo{height:38px;display:block;filter:brightness(0) invert(1);cursor:pointer}
.tb-sep{width:1px;height:28px;background:rgba(255,255,255,.2)}
.tb-name{font-family:var(--fn);font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:.5px;cursor:pointer}
.tb-name span{color:var(--or)}
.tb-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.8);padding:4px 12px;border-radius:100px;font-size:.7rem;display:flex;align-items:center;gap:5px;font-weight:500}
.tb-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80}

/* BREADCRUMB */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--brd);padding:10px 28px;display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--mt)}
.bc-link{color:var(--bl);cursor:pointer;font-weight:500;transition:.15s}
.bc-link:hover{color:var(--or)}
.bc-sep{color:var(--mt2)}
.bc-cur{color:var(--tx);font-weight:600}

/* HERO */
.hero{background:var(--white);border-bottom:1px solid var(--brd);padding:32px 28px 24px}
.hero-inner{max-width:1120px;margin:0 auto}
.hero-title{font-family:var(--fn);font-size:1.7rem;font-weight:800;color:var(--bl);letter-spacing:-.5px;line-height:1.2}
.hero-title span{color:var(--or)}
.hero-sub{color:var(--mt);font-size:.88rem;margin-top:6px;max-width:560px;line-height:1.6}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--or) 0%,var(--bl-mid) 60%,transparent 100%)}

/* MAIN */
.main{max-width:1120px;margin:0 auto;padding:28px 20px;flex:1}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;margin-top:0}
.svc-card{background:var(--white);border:1.5px solid var(--brd);border-radius:var(--r);padding:24px;cursor:pointer;transition:.2s;box-shadow:var(--sh);position:relative;overflow:hidden}
.svc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--or),var(--or-m));opacity:0;transition:.2s}
.svc-card:hover{border-color:var(--or);box-shadow:var(--sh2);transform:translateY(-3px)}
.svc-card:hover::before{opacity:1}
.svc-card.disabled{opacity:.5;cursor:not-allowed}
.svc-card.disabled:hover{transform:none;box-shadow:var(--sh);border-color:var(--brd)}
.svc-card.disabled:hover::before{opacity:0}
.svc-icon{font-size:2.2rem;margin-bottom:14px;display:block}
.svc-title{font-family:var(--fn);font-size:1rem;font-weight:700;color:var(--bl);margin-bottom:6px}
.svc-desc{font-size:.8rem;color:var(--mt);line-height:1.6}
.svc-tag{display:inline-block;margin-top:12px;background:var(--bl-l);color:var(--bl);font-size:.68rem;font-weight:600;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px}
.svc-tag.soon{background:#f1f5f9;color:var(--mt2)}
.svc-arrow{position:absolute;bottom:18px;right:18px;color:var(--or);font-size:1.1rem;opacity:0;transition:.2s}
.svc-card:hover .svc-arrow{opacity:1;transform:translateX(3px)}

/* SECTION TITLE */
.sec-title{font-family:var(--fn);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--brd)}

/* TOOL LAYOUT */
.tool-grid{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
@media(max-width:820px){.tool-grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--white);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh)}
.ch{padding:14px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.ch-ic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ich-or{background:linear-gradient(135deg,var(--or),#ffb347)}
.ich-bl{background:linear-gradient(135deg,var(--bl),var(--bl-mid))}
.ich-bl2{background:linear-gradient(135deg,var(--bl-mid),#4a9fd4)}
.ch-title{font-family:var(--fn);font-size:.9rem;font-weight:700;color:var(--bl)}
.ch-sub{font-size:.7rem;color:var(--mt);margin-top:1px}
.cb{padding:20px}

/* DROP */
.drop{border:2px dashed var(--brd2);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:.2s;background:var(--sf);position:relative}
.drop:hover{border-color:var(--or);background:var(--or-l)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-ic{font-size:2rem;display:block;margin-bottom:8px}
.drop-txt{font-size:.82rem;color:var(--mt);line-height:1.65}
.drop-txt strong{color:var(--or);font-weight:600}

/* DIVIDER */
.divd{height:1px;background:var(--brd);margin:18px 0}

/* FORM */
.fl{font-size:.7rem;font-weight:600;color:var(--bl);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.7px}
.fi{width:100%;padding:9px 12px;background:var(--sf);border:1px solid var(--brd2);border-radius:8px;color:var(--tx);font-size:.88rem;font-family:var(--bd);outline:none;transition:.2s;margin-bottom:12px}
.fi:focus{border-color:var(--bl-mid);box-shadow:0 0 0 3px rgba(46,124,196,.1)}
.fi::placeholder{color:var(--mt2)}
.fi.ok{border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.03)}

/* DETECT */
.ds{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:.77rem;color:var(--gn);display:flex;align-items:flex-start;gap:7px;line-height:1.5}

/* FILENAME */
.fnbox{background:var(--bl-l);border:1px solid var(--bl-m);border-radius:9px;padding:13px 15px}
.fnlabel{font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:var(--bl);font-weight:700;margin-bottom:6px}
.fnval{font-family:monospace;font-size:.8rem;color:var(--bl-d);word-break:break-all;line-height:1.55;font-weight:600}
.fnempty{font-size:.79rem;color:var(--mt);font-style:italic}

/* ALERTS */
.al{padding:9px 12px;border-radius:8px;font-size:.78rem;margin-top:10px;display:flex;gap:7px;align-items:flex-start;line-height:1.5}
.al-e{background:#fef2f2;border:1px solid #fecaca;color:var(--rd)}
.al-s{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--gn)}
.al-w{background:#fffbeb;border:1px solid #fde68a;color:var(--yw)}

/* PREVIEW */
.pv-wrap{min-height:260px;background:var(--sf);border:1px solid var(--brd);border-radius:9px;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;max-height:490px;overflow-y:auto}
.pv-wrap::-webkit-scrollbar{width:4px}
.pv-wrap::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
.empty-pv{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 0;color:var(--mt);gap:10px}
.empty-ic{font-size:2.5rem;opacity:.2}
.empty-tx{font-size:.82rem;text-align:center;line-height:1.7}

/* PAGE CARD */
.pc{position:relative;background:var(--white);border:1.5px solid var(--brd);border-radius:8px;overflow:hidden;cursor:grab;transition:.15s}
.pc:hover{border-color:var(--or);box-shadow:0 4px 14px rgba(245,130,31,.15);transform:translateY(-2px)}
.pc.drag{opacity:.3;transform:scale(.93)}
.pc-thumb{width:100%;height:100px;display:flex;align-items:center;justify-content:center;background:var(--sf);overflow:hidden}
.pc-thumb img,.pc-thumb canvas{max-width:100%;max-height:100px;object-fit:contain}
.pc-name{padding:5px 7px 6px;border-top:1px solid var(--brd);font-size:.63rem;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-num{position:absolute;top:4px;left:4px;background:var(--bl);color:#fff;font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:4px}
.pc-del{position:absolute;top:4px;right:4px;background:rgba(220,38,38,.08);color:var(--rd);border:1px solid rgba(220,38,38,.2);border-radius:5px;width:20px;height:20px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:.72rem;transition:.15s}
.pc-del:hover{background:rgba(220,38,38,.18)}
.pc:hover .pc-del{display:flex}

/* BUTTONS */
.btn-or{background:linear-gradient(135deg,var(--or),var(--or-d));border:none;color:#fff;padding:10px 26px;border-radius:9px;font-family:var(--fn);font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(245,130,31,.3);letter-spacing:.2px}
.btn-or:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(245,130,31,.42)}
.btn-or:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:none;border:1px solid var(--brd2);color:var(--mt);padding:8px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:var(--bd);transition:.15s}
.btn-ghost:hover{border-color:var(--rd);color:var(--rd);background:#fef2f2}
.btn-bl{background:linear-gradient(135deg,var(--bl),var(--bl-mid));border:none;color:#fff;padding:10px 22px;border-radius:9px;font-family:var(--fn);font-size:.85rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(26,78,143,.25)}
.btn-bl:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(26,78,143,.35)}
.btn-bl:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* BOTTOM BAR */
.bot{margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pg-count{font-size:.78rem;color:var(--mt)}
.pg-count strong{color:var(--bl);font-weight:700}

/* SPLIT PAGES */
.split-list{display:flex;flex-direction:column;gap:8px;max-height:460px;overflow-y:auto;padding-right:4px}
.split-list::-webkit-scrollbar{width:4px}
.split-list::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
.split-item{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px}
.split-item input[type=checkbox]{accent-color:var(--or);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.split-thumb{width:36px;height:46px;border:1px solid var(--brd2);border-radius:4px;overflow:hidden;background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.split-thumb canvas{max-width:36px;max-height:46px;object-fit:contain}
.split-info{flex:1;min-width:0}
.split-info-name{font-size:.78rem;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.split-info-page{font-size:.7rem;color:var(--mt)}
.split-dl{background:var(--bl-l);border:1px solid var(--bl-m);color:var(--bl);border-radius:6px;padding:4px 9px;font-size:.7rem;font-weight:600;cursor:pointer;border:none;font-family:var(--bd);transition:.15s;flex-shrink:0}
.split-dl:hover{background:var(--bl-m)}

/* CONVERT RESULT */
.conv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:14px}
.conv-item{background:var(--white);border:1px solid var(--brd);border-radius:9px;overflow:hidden;box-shadow:var(--sh)}
.conv-thumb{height:120px;display:flex;align-items:center;justify-content:center;background:var(--sf);overflow:hidden}
.conv-thumb img{max-width:100%;max-height:120px;object-fit:contain}
.conv-dl-btn{width:100%;padding:7px;background:linear-gradient(135deg,var(--or),var(--or-d));border:none;color:#fff;font-size:.72rem;font-weight:700;font-family:var(--fn);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.conv-dl-btn:hover{filter:brightness(1.08)}

/* SPINNER */
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
.spin-bl{border-color:rgba(26,78,143,.15);border-top-color:var(--bl-mid)}
@keyframes sp{to{transform:rotate(360deg)}}
.ldline{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.8rem;color:var(--mt)}

/* PROGRESS BAR */
.prog-bar{height:4px;background:var(--brd);border-radius:4px;overflow:hidden;margin-top:12px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--bl-mid));transition:width .3s ease;border-radius:4px}

/* FOOTER */
footer{background:linear-gradient(100deg,var(--bl-d),var(--bl));padding:20px 28px;margin-top:auto}
.ft-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ft-logo{height:32px;filter:brightness(0) invert(1);opacity:.85}
.ft-txt{font-size:.74rem;color:rgba(255,255,255,.5)}
.ft-txt strong{color:rgba(255,255,255,.8);font-weight:500}
</style>
</head>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const LOGO = JSON.parse(document.getElementById('logo-data').textContent);

// ─── Helpers ─────────────────────────────────────────────────────────────────
function parseDate(text) {
  const pats = [
    { re:/\b(\d{2})[\.\/\-](\d{2})[\.\/\-](\d{4})\b/, fn:m=>`${m[1]}.${m[2]}.${m[3].slice(2)}` },
    { re:/\b(\d{2})[\.\/\-](\d{2})[\.\/\-](\d{2})\b/, fn:m=>`${m[1]}.${m[2]}.${m[3]}` },
    { re:/\b(\d{4})(\d{2})(\d{2})\b/,                       fn:m=>`${m[3]}.${m[2]}.${m[1].slice(2)}` },
    { re:/\b(\d{1,2})\s+de\s+(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)[a-z]*\.?\s+(\d{2,4})/i,
      fn:m=>{ const mon={jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'};
              const yr=m[3].length===4?m[3].slice(2):m[3]; return `${m[1].padStart(2,'0')}.${mon[m[2].toLowerCase().slice(0,3)]}.${yr}`; }},
  ];
  for (const {re,fn} of pats) { const m=text.match(re); if(m) return fn(m); }
  return '';
}
function parseValue(text) {
  const pats=[
    /R\$\s*([\d]{1,3}(?:[.,]\d{3})*[.,]\d{2})/,
    /R\$\s*(\d+[.,]\d{2})/,
    /(\d{1,3}(?:\.\d{3})+,\d{2})/,
  ];
  for (const re of pats) {
    const m=text.match(re);
    if(m){
      let v=m[1].replace(/\./g,'').replace(',','.');
      const parts=v.split('.');
      if(parts.length===2) return `R$ ${parseFloat(v).toFixed(2)}`;
      return `R$ ${v}`;
    }
  }
  return '';
}
function parseProvider(names) {
  const stop=new Set(['boleto','comprovante','nota','fiscal','recibo','pagamento','pago','pdf','jpg','png','scan','arquivo','doc','file','pro','imagem','exames','consultas','unidoc','mes','pg','pag','num','nf','nfe','ref','de','do','da','em','no','na','os','as','um','uma']);
  const candidates=names.flatMap(n=>
    n.replace(/\.[^.]+$/,'').replace(/[_\-\.]/g,' ').split(/\s+/)
      .filter(w=>w.length>=3&&/^[A-ZÁÉÍÓÚÂÊÎÔÛÃÕ]/i.test(w)&&!/^\d/.test(w)&&!stop.has(w.toLowerCase()))
  );
  return [...new Set(candidates)].slice(0,3).join(' ');
}
async function extractPdfText(file) {
  if(!window.pdfjsLib) return '';
  try {
    const buf=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=Math.min(pdf.numPages,3);i++){
      const pg=await pdf.getPage(i);
      const tc=await pg.getTextContent();
      text+=tc.items.map(x=>x.str).join(' ')+' ';
    }
    return text;
  } catch{ return ''; }
}

// ─── Splash ───────────────────────────────────────────────────────────────────
function Splash() {
  return (
    <div className="splash">
      <img className="sp-logo" src={LOGO} alt="Pro Imagem"/>
      <div className="sp-name">UNI<span>DOC</span></div>
      <div className="sp-track"><div className="sp-bar"></div></div>
      <div className="sp-sub">Carregando bibliotecas…</div>
    </div>
  );
}

// ─── Page Card (merge/reorder) ────────────────────────────────────────────────
function PageCard({page,index,isDragging,onDelete,onDragStart,onDragOver,onDrop,onDragEnd}) {
  const canvasRef=useRef(null);
  useEffect(()=>{
    if(page.type==='pdf'&&page.pdfDoc&&canvasRef.current){
      (async()=>{
        try{
          const pg=await page.pdfDoc.getPage(page.pageNumber);
          const vp=pg.getViewport({scale:1.4});
          const ctx=canvasRef.current.getContext('2d');
          canvasRef.current.width=vp.width; canvasRef.current.height=vp.height;
          await pg.render({canvasContext:ctx,viewport:vp}).promise;
        }catch{}
      })();
    }
  },[page]);
  return (
    <div className={`pc${isDragging?' drag':''}`} draggable
      onDragStart={e=>onDragStart(e,index)} onDragOver={e=>onDragOver(e,index)}
      onDrop={onDrop} onDragEnd={onDragEnd}>
      <div className="pc-thumb">
        {page.type==='image'?<img src={page.dataUrl} alt=""/>:<canvas ref={canvasRef}/>}
      </div>
      <span className="pc-num">{index+1}</span>
      <button className="pc-del" onClick={()=>onDelete(page.id)}>✕</button>
      <div className="pc-name" title={page.file.name}>{page.file.name}{page.type==='pdf'?` p.${page.pageNumber}`:''}</div>
    </div>
  );
}

// ─── Split Thumb ──────────────────────────────────────────────────────────────
function SplitThumb({pdfDoc,pageNum}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(pdfDoc&&ref.current){
      (async()=>{
        try{
          const pg=await pdfDoc.getPage(pageNum);
          const vp=pg.getViewport({scale:.4});
          const ctx=ref.current.getContext('2d');
          ref.current.width=vp.width; ref.current.height=vp.height;
          await pg.render({canvasContext:ctx,viewport:vp}).promise;
        }catch{}
      })();
    }
  },[pdfDoc,pageNum]);
  return <canvas ref={ref} style={{maxWidth:36,maxHeight:46}}/>;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOL: UNIR
// ═══════════════════════════════════════════════════════════════════════════════
function MergeTool() {
  const [pages,setPages]=useState([]);
  const [loading,setLoading]=useState(false);
  const [dragged,setDragged]=useState(null);
  const [error,setError]=useState('');
  const [ok,setOk]=useState('');
  const [detected,setDetected]=useState(false);
  const [meta,setMeta]=useState({data:'',tipo:'BOLETO E COMPROVANTE',prestador:'',valor:''});

  const fn=(()=>{
    const d=meta.data.replace(/[^0-9.]/g,'')||'SemData';
    const t=meta.tipo.replace(/[^a-zA-Z0-9\s]/g,'_').trim()||'Doc';
    const p=meta.prestador.replace(/[^a-zA-Z0-9\s]/g,'').trim()||'SemPrestador';
    const v=meta.valor.replace(/[^\w$.\s]/g,'').trim()||'SemValor';
    return `${d} ${t} ${p} ${v}.pdf`;
  })();
  const hasFilename=meta.data&&meta.prestador&&meta.valor;

  const handleFiles=async(files)=>{
    if(!window.pdfjsLib){setError('Bibliotecas carregando…');return;}
    setLoading(true);setError('');setOk('');
    // Auto-detect from filenames + PDF text
    const allText=files.map(f=>f.name).join(' ');
    let detText=allText;
    for(const f of files){
      if(f.type==='application/pdf'){
        const t=await extractPdfText(f);
        detText+=' '+t;
      }
    }
    const d=parseDate(detText);
    const v=parseValue(detText);
    const pr=parseProvider(files.map(f=>f.name));
    if(d||v||pr){
      setDetected(true);
      setMeta(prev=>({...prev,data:d||prev.data,valor:v||prev.valor,prestador:pr||prev.prestador}));
    }
    const results=[];
    for(const file of files){
      try{
        if(file.type.startsWith('image/')){
          const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
          results.push({id:`${file.name}-${Date.now()}-${Math.random()}`,type:'image',file,dataUrl});
        } else if(file.type==='application/pdf'){
          const buf=await file.arrayBuffer();
          const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
          for(let i=1;i<=pdf.numPages;i++)
            results.push({id:`${file.name}-${Date.now()}-${Math.random()}-${i}`,type:'pdf',file,pdfDoc:pdf,pageNumber:i});
        } else setError(`Tipo não suportado: ${file.name}`);
      }catch(e){setError(`Erro em ${file.name}: ${e.message}`);}
    }
    setPages(prev=>[...prev,...results]);
    setLoading(false);
  };

  const onDragStart=(e,i)=>setDragged(pages[i]);
  const onDragOver=(e,i)=>{
    e.preventDefault();
    if(!dragged||dragged.id===pages[i].id)return;
    const arr=[...pages],from=arr.findIndex(p=>p.id===dragged.id);
    const[it]=arr.splice(from,1);arr.splice(i,0,it);setPages(arr);
  };
  const onDrop=e=>{e.preventDefault();setDragged(null);};
  const onDragEnd=()=>setDragged(null);
  const onDelete=id=>setPages(prev=>prev.filter(p=>p.id!==id));

  const generate=async()=>{
    if(!window.PDFLib||pages.length===0)return;
    setLoading(true);setError('');setOk('');
    try{
      const{PDFDocument}=window.PDFLib;
      const doc=await PDFDocument.create();
      for(const pg of pages){
        if(pg.type==='image'){
          const bytes=await fetch(pg.dataUrl).then(r=>r.arrayBuffer());
          const img=pg.file.type==='image/jpeg'?await doc.embedJpg(bytes):await doc.embedPng(bytes);
          const page=doc.addPage();
          const{width,height}=page.getSize();
          const dims=img.scaleToFit(width-40,height-40);
          page.drawImage(img,{x:(width-dims.width)/2,y:(height-dims.height)/2,...dims});
        } else if(pg.type==='pdf'){
          const bytes=await pg.file.arrayBuffer();
          const src=await PDFDocument.load(bytes);
          const[cp]=await doc.copyPages(src,[pg.pageNumber-1]);
          doc.addPage(cp);
        }
      }
      const bytes=await doc.save();
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([bytes],{type:'application/pdf'})),download:fn});
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      setOk(`PDF salvo: "${fn}"`);
    }catch(e){setError(`Erro: ${e.message}`);}
    finally{setLoading(false);}
  };

  const fileCount=[...new Set(pages.map(p=>p.file.name))].length;
  return (
    <div className="tool-grid">
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        <div className="card">

// TOOL: DIVIDIR
// ═══════════════════════════════════════════════════════════════════════════════
function SplitTool() {
  const [pdfFile,setPdfFile]=useState(null);
  const [pdfDoc,setPdfDoc]=useState(null);
  const [numPages,setNumPages]=useState(0);
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [error,setError]=useState('');
  const [ok,setOk]=useState('');

  const loadFile=async(file)=>{
    if(file.type!=='application/pdf'){setError('Selecione um arquivo PDF.');return;}
    setLoading(true);setError('');setOk('');
    try{
      const buf=await file.arrayBuffer();
      const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
      setPdfFile(file);setPdfDoc(pdf);setNumPages(pdf.numPages);
      setSelected(Array.from({length:pdf.numPages},(_,i)=>i+1));
    }catch(e){setError(`Erro ao carregar PDF: ${e.message}`);}
    finally{setLoading(false);}
  };

  const togglePage=n=>setSelected(prev=>prev.includes(n)?prev.filter(x=>x!==n):[...prev,n].sort((a,b)=>a-b));
  const toggleAll=()=>setSelected(selected.length===numPages?[]:Array.from({length:numPages},(_,i)=>i+1));

  const downloadPage=async(pageNum)=>{
    try{
      const{PDFDocument}=window.PDFLib;
      const bytes=await pdfFile.arrayBuffer();
      const src=await PDFDocument.load(bytes);
      const doc=await PDFDocument.create();
      const[cp]=await doc.copyPages(src,[pageNum-1]);
      doc.addPage(cp);
      const out=await doc.save();
      const base=pdfFile.name.replace(/\.pdf$/i,'');
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),download:`${base}_pagina_${pageNum}.pdf`});
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
    }catch(e){setError(`Erro: ${e.message}`);}
  };

  const downloadSelected=async()=>{
    if(!window.JSZip){setError('JSZip não carregado.');return;}
    setLoading(true);setError('');setOk('');setProgress(0);
    try{
      const{PDFDocument}=window.PDFLib;
      const bytes=await pdfFile.arrayBuffer();
      const src=await PDFDocument.load(bytes);
      const zip=new window.JSZip();
      const base=pdfFile.name.replace(/\.pdf$/i,'');
      for(let idx=0;idx<selected.length;idx++){
        const n=selected[idx];
        const doc=await PDFDocument.create();
        const[cp]=await doc.copyPages(src,[n-1]);
        doc.addPage(cp);
        const out=await doc.save();
        zip.file(`${base}_pagina_${n}.pdf`,out);
        setProgress(Math.round(((idx+1)/selected.length)*100));
      }
      const blob=await zip.generateAsync({type:'blob'});
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${base}_dividido.zip`});
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      setOk(`${selected.length} página(s) baixadas como ZIP.`);
    }catch(e){setError(`Erro: ${e.message}`);}
    finally{setLoading(false);setProgress(0);}
  };

  return (
    <div style={{maxWidth:720}}>
      <div className="card">
        <div className="ch"><div className="ch-ic ich-or">✂️</div><div><div className="ch-title">Dividir PDF</div><div className="ch-sub">Extraia páginas individuais ou em lote</div></div></div>
        <div className="cb">
          {!pdfFile?(
            <label><div className="drop">
              <span className="drop-ic">📄</span>
              <div className="drop-txt"><strong>Selecione um PDF</strong><br/>para dividir em páginas</div>
              <input type="file" accept="application/pdf" onChange={e=>e.target.files[0]&&loadFile(e.target.files[0])}/>
            </div></label>
          ):(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontWeight:600,color:'var(--bl)',fontSize:'.88rem'}}>{pdfFile.name}</div>
                  <div style={{fontSize:'.74rem',color:'var(--mt)',marginTop:2}}>{numPages} página{numPages!==1?'s':''} · {selected.length} selecionada{selected.length!==1?'s':''}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-ghost" style={{fontSize:'.74rem',padding:'6px 11px'}} onClick={toggleAll}>{selected.length===numPages?'Desselect. todas':'Select. todas'}</button>
                  <button className="btn-ghost" style={{fontSize:'.74rem',padding:'6px 11px'}} onClick={()=>{setPdfFile(null);setPdfDoc(null);setNumPages(0);setSelected([]);setOk('');setError('');}}>Trocar arquivo</button>
                </div>
              </div>
              {loading&&progress>0&&<div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}></div></div>}
              {loading&&progress===0&&<div className="ldline"><span className="spin spin-bl"></span>Carregando…</div>}
              <div className="split-list">
                {Array.from({length:numPages},(_,i)=>i+1).map(n=>(
                  <div key={n} className="split-item">
                    <input type="checkbox" checked={selected.includes(n)} onChange={()=>togglePage(n)}/>
                    <div className="split-thumb">{pdfDoc&&<SplitThumb pdfDoc={pdfDoc} pageNum={n}/>}</div>
                    <div className="split-info">
                      <div className="split-info-name">{pdfFile.name.replace(/\.pdf$/i,'')}</div>
                      <div className="split-info-page">Página {n} de {numPages}</div>
                    </div>
                    <button className="split-dl" onClick={()=>downloadPage(n)}>⬇ Baixar</button>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:16,gap:8}}>
                <button className="btn-or" onClick={downloadSelected} disabled={selected.length===0||loading}>
                  {loading?<><span className="spin"></span>Gerando ZIP…</>:<>⬇ Baixar {selected.length} pág. como ZIP</>}
                </button>
              </div>
              {error&&<div className="al al-e"><span>⚠</span><span>{error}</span></div>}
              {ok&&<div className="al al-s"><span>✓</span><span>{ok}</span></div>}
            </>
          )}
          {error&&!pdfFile&&<div className="al al-e"><span>⚠</span><span>{error}</span></div>}
        </div>
      </div>
    </div>
  );
}

// TOOL: CONVERTER PDF → IMAGENS
// ═══════════════════════════════════════════════════════════════════════════════
function ConvertTool() {
  const [pdfFile,setPdfFile]=useState(null);
  const [images,setImages]=useState([]);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [error,setError]=useState('');
  const [dpi,setDpi]=useState('150');

  const convert=async(file)=>{
    if(file.type!=='application/pdf'){setError('Selecione um PDF.');return;}
    setLoading(true);setError('');setImages([]);setProgress(0);setPdfFile(file);
    try{
      const scale=parseInt(dpi)/96;
      const buf=await file.arrayBuffer();
      const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
      const imgs=[];
      for(let i=1;i<=pdf.numPages;i++){
        const pg=await pdf.getPage(i);
        const vp=pg.getViewport({scale});
        const canvas=document.createElement('canvas');
        canvas.width=vp.width;canvas.height=vp.height;
        await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
        imgs.push({page:i,url:canvas.toDataURL('image/jpeg',0.92),w:vp.width,h:vp.height});
        setProgress(Math.round((i/pdf.numPages)*100));
      }
      setImages(imgs);
    }catch(e){setError(`Erro: ${e.message}`);}
    finally{setLoading(false);setProgress(0);}
  };

  const dlAll=async()=>{
    if(!window.JSZip||images.length===0)return;
    const zip=new window.JSZip();
    const base=pdfFile.name.replace(/\.pdf$/i,'');
    for(const img of images){
      const res=await fetch(img.url);
      const blob=await res.blob();
      zip.file(`${base}_pagina_${img.page}.jpg`,blob);
    }
    const blob=await zip.generateAsync({type:'blob'});
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${base}_imagens.zip`});
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  };

  return (
    <div style={{maxWidth:860}}>
      <div className="card">
        <div className="ch"><div className="ch-ic ich-bl">🖼️</div><div><div className="ch-title">PDF → Imagens</div><div className="ch-sub">Converta cada página em JPEG de alta qualidade</div></div></div>
        <div className="cb">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            <div>
              <label className="fl" style={{marginBottom:4}}>Qualidade / DPI</label>
              <select className="fi" style={{width:'auto',marginBottom:0}} value={dpi} onChange={e=>setDpi(e.target.value)}>
                <option value="96">96 dpi — Rápido</option>
                <option value="150">150 dpi — Padrão</option>
                <option value="200">200 dpi — Alta qualidade</option>
                <option value="300">300 dpi — Impressão</option>
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="fl" style={{marginBottom:4}}>Arquivo PDF</label>
              <label style={{display:'block'}}>
                <div className="drop" style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:'1.2rem'}}>📄</span>
                  <div className="drop-txt" style={{textAlign:'left'}}>{pdfFile?<><strong style={{color:'var(--bl)'}}>{pdfFile.name}</strong><br/><span style={{fontSize:'.72rem'}}>Clique para trocar</span></>:<><strong>Selecione um PDF</strong></>}</div>
                  <input type="file" accept="application/pdf" onChange={e=>e.target.files[0]&&convert(e.target.files[0])}/>
                </div>
              </label>
            </div>
          </div>
          {loading&&<><div className="ldline"><span className="spin spin-bl"></span>Convertendo página {Math.ceil(progress/100*((images.length)||1))}…</div><div className="prog-bar" style={{marginTop:8}}><div className="prog-fill" style={{width:`${progress}%`}}></div></div></>}
          {error&&<div className="al al-e"><span>⚠</span><span>{error}</span></div>}
          {images.length>0&&(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
                <div style={{fontSize:'.82rem',color:'var(--mt)'}}>{images.length} imagem{images.length!==1?'s':''} gerada{images.length!==1?'s':''}</div>
                <button className="btn-or" style={{padding:'7px 18px',fontSize:'.8rem'}} onClick={dlAll}>⬇ Baixar todas como ZIP</button>
              </div>
              <div className="conv-grid">
                {images.map(img=>(
                  <div key={img.page} className="conv-item">
                    <div className="conv-thumb"><img src={img.url} alt={`Pág ${img.page}`}/></div>
                    <a href={img.url} download={`${pdfFile.name.replace(/\.pdf$/i,'')}_pagina_${img.page}.jpg`}>
                      <div className="conv-dl-btn">⬇ Pág. {img.page}</div>
                    </a>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// TOOL: COMPRIMIR PDF
// ═══════════════════════════════════════════════════════════════════════════════
function CompressTool() {
  const [pdfFile,setPdfFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [quality,setQuality]=useState('0.7');

  const compress=async(file)=>{
    if(file.type!=='application/pdf'){setError('Selecione um PDF.');return;}
    setLoading(true);setError('');setResult(null);setProgress(0);setPdfFile(file);
    try{
      const{PDFDocument}=window.PDFLib;
      const buf=await file.arrayBuffer();
      const srcBytes=new Uint8Array(buf);
      const pdfSrc=await window.pdfjsLib.getDocument({data:buf}).promise;
      const pdfDest=await PDFDocument.create();
      const q=parseFloat(quality);

      for(let i=1;i<=pdfSrc.numPages;i++){
        const pg=await pdfSrc.getPage(i);
        const vp=pg.getViewport({scale:1.5});
        const canvas=document.createElement('canvas');
        canvas.width=vp.width;canvas.height=vp.height;
        await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
        const dataUrl=canvas.toDataURL('image/jpeg',q);
        const res=await fetch(dataUrl);
        const imgBytes=await res.arrayBuffer();
        const img=await pdfDest.embedJpg(imgBytes);
        const page=pdfDest.addPage([vp.width,vp.height]);
        page.drawImage(img,{x:0,y:0,width:vp.width,height:vp.height});
        setProgress(Math.round((i/pdfSrc.numPages)*100));
      }
      const outBytes=await pdfDest.save();
      const origSize=srcBytes.length;
      const newSize=outBytes.length;
      const reduction=Math.round((1-newSize/origSize)*100);
      setResult({bytes:outBytes,origSize,newSize,reduction,filename:file.name.replace(/\.pdf$/i,'')+'_comprimido.pdf'});
    }catch(e){setError(`Erro: ${e.message}`);}
    finally{setLoading(false);setProgress(0);}
  };

  const fmt=n=>n>1048576?`${(n/1048576).toFixed(1)} MB`:`${Math.round(n/1024)} KB`;

  const download=()=>{
    if(!result)return;
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([result.bytes],{type:'application/pdf'})),download:result.filename});
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  };

  return (
    <div style={{maxWidth:600}}>
      <div className="card">
        <div className="ch"><div className="ch-ic ich-or">📦</div><div><div className="ch-title">Comprimir PDF</div><div className="ch-sub">Reduza o tamanho do arquivo</div></div></div>
        <div className="cb">
          <div style={{marginBottom:14}}>
            <label className="fl">Nível de compressão</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:0}}>
              {[['0.85','🟢 Suave','Menor perda visual'],['0.7','🟡 Equilibrado','Boa compressão'],['0.5','🔴 Agressivo','Máxima redução']].map(([v,label,desc])=>(
                <div key={v} onClick={()=>setQuality(v)} style={{border:`2px solid ${quality===v?'var(--or)':'var(--brd2)'}`,borderRadius:9,padding:'10px 12px',cursor:'pointer',background:quality===v?'var(--or-l)':'var(--sf)',transition:'.15s'}}>
                  <div style={{fontSize:'.85rem',fontWeight:600,color:quality===v?'var(--or-d)':'var(--tx)'}}>{label}</div>
                  <div style={{fontSize:'.72rem',color:'var(--mt)',marginTop:2}}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
          <label><div className="drop">
            <span className="drop-ic">📄</span>
            <div className="drop-txt">{pdfFile?<><strong style={{color:'var(--bl)'}}>{pdfFile.name}</strong><br/><span style={{fontSize:'.74rem'}}>Clique para trocar</span></>:<><strong>Selecione o PDF</strong> para comprimir</>}</div>
            <input type="file" accept="application/pdf" onChange={e=>e.target.files[0]&&compress(e.target.files[0])}/>
          </div></label>
          {loading&&<><div className="ldline"><span className="spin spin-bl"></span>Comprimindo… {progress}%</div><div className="prog-bar" style={{marginTop:8}}><div className="prog-fill" style={{width:`${progress}%`}}></div></div></>}
          {error&&<div className="al al-e"><span>⚠</span><span>{error}</span></div>}
          {result&&(
            <div style={{marginTop:16,background:'var(--bl-l)',border:'1px solid var(--bl-m)',borderRadius:10,padding:16}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14,textAlign:'center'}}>
                <div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.8px',color:'var(--bl)',fontWeight:700}}>Original</div><div style={{fontSize:'1.1rem',fontWeight:700,color:'var(--tx)',marginTop:4}}>{fmt(result.origSize)}</div></div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem'}}>→</div>
                <div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.8px',color:'var(--gn)',fontWeight:700}}>Comprimido</div><div style={{fontSize:'1.1rem',fontWeight:700,color:'var(--gn)',marginTop:4}}>{fmt(result.newSize)}</div></div>
              </div>
              <div style={{textAlign:'center',marginBottom:14,fontSize:'.85rem',color:'var(--bl)',fontWeight:600}}>
                {result.reduction>0?`🎉 Redução de ${result.reduction}%`:`⚠ Arquivo ${Math.abs(result.reduction)}% maior (tente qualidade menor)`}
              </div>
              <button className="btn-or" style={{width:'100%',justifyContent:'center'}} onClick={download}>⬇ Baixar PDF Comprimido</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            <div className="svc-title">{s.title}</div>
            <div className="svc-desc">{s.desc}</div>
            <span className={`svc-tag${s.tag==='em breve'?' soon':''}`}>{s.tag}</span>
            {s.tag!=='em breve'&&<span className="svc-arrow">→</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
const TOOL_INFO={
  merge:{icon:'🔗',title:'Unir Documentos'},
  split:{icon:'✂️',title:'Dividir PDF'},
  convert:{icon:'🖼️',title:'PDF → Imagens'},
  compress:{icon:'📦',title:'Comprimir PDF'},
};

function App() {
  const [ready,setReady]=useState(false);
  const [tool,setTool]=useState(null);

  useEffect(()=>{
    let n=0;
    const t=setInterval(()=>{
      n++;
      if(window.pdfjsLib&&window.PDFLib){
        clearInterval(t);
        window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        setReady(true);
      }
      if(n>70){clearInterval(t);setReady(true);}
    },100);
    return()=>clearInterval(t);
  },[]);

  if(!ready) return <Splash/>;

  const info=tool?TOOL_INFO[tool]:null;

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <nav className="topbar">
        <div className="tb-left">
          <img className="tb-logo" src={LOGO} alt="Pro Imagem" onClick={()=>setTool(null)}/>
          <div className="tb-sep"></div>
          <div className="tb-name" onClick={()=>setTool(null)}>UNI<span>DOC</span></div>
        </div>
        <div className="tb-badge"><span className="tb-dot"></span>100% local · gratuito</div>
      </nav>

      {tool&&(
        <div className="breadcrumb">
          <span className="bc-link" onClick={()=>setTool(null)}>🏠 Início</span>
          <span className="bc-sep">›</span>
          <span className="bc-cur">{info.icon} {info.title}</span>
        </div>
      )}

      <div className="hero">
        <div className="hero-inner">
          {tool?(
            <>
              <div className="hero-title">{info.icon} {info.title}</div>
              <div className="hero-sub">Processamento 100% local no seu navegador. Nenhum arquivo é enviado para servidores.</div>
            </>
          ):(
            <>
              <div className="hero-title">Bem-vindo ao <span>UNIDOC</span></div>
              <div className="hero-sub">Suite de ferramentas para gestão de documentos PDF. Seguro, rápido e sem envio de dados.</div>
            </>
          )}
        </div>
      </div>
      <div className="accent-bar"></div>

      <div className="main">
        {!tool&&<Dashboard onSelect={setTool}/>}
        {tool==='merge'&&<MergeTool/>}
        {tool==='split'&&<SplitTool/>}
        {tool==='convert'&&<ConvertTool/>}
        {tool==='compress'&&<CompressTool/>}
      </div>

      <footer>
        <div className="ft-inner">
          <img className="ft-logo" src={LOGO} alt="Pro Imagem"/>
          <div className="ft-txt">© {new Date().getFullYear()} <strong>UNIDOC</strong> · Desenvolvido por <strong>Carlos Henrique</strong> · Pro Imagem Exames e Consultas · Processamento 100% local</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
