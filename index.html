<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
:root{
  --primary:#0b4d77;
  --secondary:#d88a32;
  --light:#f4f8fb;
  --dark:#1b2733;
  --white:#ffffff;
  --border:#dbe4ea;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:linear-gradient(180deg,#eef5fb,#ffffff);
  color:var(--dark);
}

header{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:999;
}

.container{
  width:min(1200px,95%);
  margin:auto;
}

.header-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-area img{
  width:90px;
}

.logo-text h1{
  font-size:1.6rem;
  color:var(--primary);
  font-weight:800;
}

.logo-text p{
  color:#666;
  font-size:.9rem;
}

.hero{
  padding:70px 20px;
  text-align:center;
  background:
    linear-gradient(rgba(11,77,119,.88),rgba(11,77,119,.88)),
    linear-gradient(135deg,#0b4d77,#0d5f91);
  color:white;
}

.hero h2{
  font-size:3rem;
  margin-bottom:15px;
}

.hero p{
  font-size:1.1rem;
  opacity:.95;
  max-width:700px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  margin-top:40px;
}

.card{
  background:white;
  border-radius:20px;
  padding:30px;
  border:1px solid var(--border);
  transition:.25s;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.04);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 35px rgba(0,0,0,.08);
}

.card .icon{
  width:70px;
  height:70px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  margin-bottom:20px;
  background:linear-gradient(135deg,var(--primary),#1b7cbc);
  color:white;
}

.card h3{
  color:var(--primary);
  margin-bottom:10px;
}

.tool-box{
  background:white;
  padding:30px;
  border-radius:22px;
  margin-top:40px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.dropzone{
  border:2px dashed #b8cad6;
  border-radius:18px;
  padding:50px 20px;
  text-align:center;
  transition:.2s;
  cursor:pointer;
  background:#f9fcff;
}

.dropzone:hover{
  background:#edf6fd;
  border-color:var(--primary);
}

.pages{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:30px;
}

.page-card{
  background:white;
  border-radius:14px;
  border:1px solid var(--border);
  padding:12px;
}

.page-card canvas{
  width:100%;
  border-radius:10px;
}

.page-card small{
  display:block;
  margin-top:10px;
  color:#666;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}
