<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNIDOC - ProImagem</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0b4d77;
  --secondary:#d88a32;
  --light:#f4f8fb;
  --dark:#1b2733;
  --white:#ffffff;
  --border:#dbe4ea;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  background:linear-gradient(180deg,#eef5fb,#ffffff);
  color:var(--dark);
}

header{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:999;
}

.container{
  width:min(1200px,95%);
  margin:auto;
}

.header-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo-area{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-area img{
  width:90px;
}

.logo-text h1{
  font-size:1.6rem;
  color:var(--primary);
  font-weight:800;
}

.logo-text p{
  color:#666;
  font-size:.9rem;
}

.hero{
  padding:70px 20px;
  text-align:center;
  background:
    linear-gradient(rgba(11,77,119,.88),rgba(11,77,119,.88)),
    linear-gradient(135deg,#0b4d77,#0d5f91);
  color:white;
}

.hero h2{
  font-size:3rem;
  margin-bottom:15px;
}

.hero p{
  font-size:1.1rem;
  opacity:.95;
  max-width:700px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  margin-top:40px;
}

.card{
  background:white;
  border-radius:20px;
  padding:30px;
  border:1px solid var(--border);
  transition:.25s;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.04);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 35px rgba(0,0,0,.08);
}

.card .icon{
  width:70px;
  height:70px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  margin-bottom:20px;
  background:linear-gradient(135deg,var(--primary),#1b7cbc);
  color:white;
}

.card h3{
  color:var(--primary);
  margin-bottom:10px;
}

.tool-box{
  background:white;
  padding:30px;
  border-radius:22px;
  margin-top:40px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.dropzone{
  border:2px dashed #b8cad6;
  border-radius:18px;
  padding:50px 20px;
  text-align:center;
  transition:.2s;
  cursor:pointer;
  background:#f9fcff;
}

.dropzone:hover{
  background:#edf6fd;
  border-color:var(--primary);
}

.pages{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:30px;
}

.page-card{
  background:white;
  border-radius:14px;
  border:1px solid var(--border);
  padding:12px;
}

.page-card canvas{
  width:100%;
  border-radius:10px;
}

.page-card small{
  display:block;
  margin-top:10px;
  color:#666;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.field label{
  font-weight:600;
}

.field input,
.field select{
  height:50px;
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 15px;
  font-size:.95rem;
}

.btn{
  height:52px;
  border:none;
  border-radius:14px;
  padding:0 25px;
  background:linear-gradient(135deg,var(--secondary),#ef9f45);
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.action-area{
  margin-top:30px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.alert{
  margin-top:20px;
  padding:14px;
  border-radius:12px;
}

.success{
  background:#ecfdf5;
  color:#166534;
}

.error{
  background:#fef2f2;
  color:#991b1b;
}

footer{
  margin-top:70px;
  background:#0b4d77;
  color:white;
  text-align:center;
  padding:35px 20px;
}

footer strong{
  color:#f0a652;
}

@media(max-width:700px){
  .hero h2{
    font-size:2rem;
  }
  .logo-area img{
    width:70px;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

function PagePreview({page}){
  const canvasRef = useRef(null);

  useEffect(()=>{
    async function renderPage(){
      const buffer = await page.file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data:buffer }).promise;
      const pdfPage = await pdf.getPage(page.pageIndex + 1);
      const viewport = pdfPage.getViewport({ scale:0.4 });
      const canvas = canvasRef.current;
      const context = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await pdfPage.render({ canvasContext:context, viewport }).promise;
    }
    renderPage();
  },[]);

  return(
    <div className="page-card">
      <canvas ref={canvasRef}></canvas>
      <small>{page.file.name}</small>
    </div>
  )
}

function MergeTool() {
  const [pages, setPages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [message, setMessage] = useState(null);

  // Estados dos campos na ordem correta
  const [dataPagamento, setDataPagamento] = useState("");
  const [prestador, setPrestador] = useState("");
  const [valor, setValor] = useState("");

  // Função robusta de extração automática de dados
  async function extrairDadosAutomatico(pdf) {
    try {
      if (pdf.numPages === 0) return;
      
      const firstPage = await pdf.getPage(1);
      const textContent = await firstPage.getTextContent();
      
      // Captura o texto mantendo uma leitura linear por linhas e espaços
      const linhas = textContent.items.map(item => item.str);
      const textoCompleto = linhas.join(" ");
      const textoComQuebras = linhas.join("\n");

      // 1. RECONHECIMENTO DE DATA (Procura DD/MM/AAAA ou DD.MM.AAAA)
      const regexData = /(\d{2})[\/\.](\d{2})[\/\.](\d{4})/;
      const dataEncontrada = textoCompleto.match(regexData);
      if (dataEncontrada) {
        const [_, dia, mes, ano] = dataEncontrada;
        setDataPagamento(`${ano}-${mes}-${dia}`); // Formato para o <input type="date">
      }

      // 2. RECONHECIMENTO DE VALOR (Procura R$ XX,XX ou R$ XX.XX)
      const regexValor = /R\$\s*([0-9\.\,]+)/i;
      const valorEncontrado = textoCompleto.match(regexValor);
      if (valorEncontrado) {
        let valorCru = valorEncontrado[1].trim();
        // Se terminar com vírgula e dois dígitos (padrão BR), ajustamos para o formato visual
        if (/\,\d{2}$/.test(valorCru)) {
          setValor(`R$ ${valorCru}`);
        } else {
          setValor(`R$ ${valorCru}`);
        }
      }

      // 3. RECONHECIMENTO DE PRESTADOR / EMPRESA / MÉDICO
      let nomeIdentificado = "";

      // Estratégia A: Procura por indicadores corporativos comuns (LTDA, S.A., S/A, S/C, ME, EPP)
      const regexCorporativa = /([A-Z0-9À-Ý\s\.\-\&]{4,}(?:LTDA|S\.A\.|S\/A|S\/C|MEI|M\.E\.|EPP|COMPANHIA|INSTITUTO|CLINICA|HOSPITAL|LABORATORIO|PROIMAGEM))/i;
      const matchCorp = textoCompleto.match(regexCorporativa);
      if (matchCorp && matchCorp[1].trim().length > 5) {
        nomeIdentificado = matchCorp[1].trim();
      }

      // Estratégia B: Se não achou por sigla, busca por campos de formulários comuns de boletos/NF
      if (!nomeIdentificado) {
        const termosChave = [
          /(?:Razão Social|Razao Social|Nome\/Razão Social):\s*([^\n\r\t]+)/i,
          /(?:Beneficiário|Beneficiario|Cedente|Prestador|Prestador de Serviços):\s*([^\n\r\t]+)/i,
          /(?:Emitente|Nome do Emitente|Fornecedor):\s*([^\n\r\t]+)/i,
          /(?:Nome do Médico|Médico|Dr\.|Dra\.):\s*([^\n\r\t]+)/i
        ];

        for (const regex of termosChave) {
          const match = textoComQuebras.match(regex);
          if (match && match[1].trim().length > 3) {
            // Limpa caracteres residuais comuns do final da linha
            nomeIdentificado = match[1].split(/[;:,]/)[0].trim();
            break;
          }
        }
      }

      // Se identificou um prestador (médico ou empresa), atualiza o campo
      if (nomeIdentificado) {
        // Remove espaços duplos e limpa pontuações soltas
        nomeIdentificado = nomeIdentificado.replace(/\s+/g, ' ').trim();
        setPrestador(nomeIdentificado);
      }

    } catch (err) {
      console.warn("Aviso: Não foi possível extrair os dados automaticamente deste documento.", err);
    }
  }

  async function handleFiles(e) {
    const files = Array.from(e.target.files || e.dataTransfer.files);
    const list = [];
    let primeiroPdfCarregado = null;

    for (const file of files) {
      if (file.type !== 'application/pdf') continue;
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

      if (!primeiroPdfCarregado) {
        primeiroPdfCarregado = pdf;
      }

      for (let i = 0; i < pdf.numPages; i++) {
        list.push({
          id: crypto.randomUUID(),
          file,
          pageIndex: i
        });
      }
    }
    
    setPages(prev => [...prev, ...list]);

    if (primeiroPdfCarregado) {
      // Pequeno delay para garantir estabilidade na leitura do buffer
      setTimeout(async () => {
        await extrairDadosAutomatico(primeiroPdfCarregado);
      }, 200);
    }
  }

  // Máscara visual enquanto digita (mantém padrão R$ XX.XX ou R$ XX,XX conforme preferência de digitação)
  const handleValorChange = (e) => {
    let v = e.target.value;
    setValor(v);
  };

  async function generatePDF() {
    try {
      setLoading(true);
      const pdfDoc = await PDFLib.PDFDocument.create();

      for (const item of pages) {
        const buffer = await item.file.arrayBuffer();
        const source = await PDFLib.PDFDocument.load(buffer);
        const [page] = await pdfDoc.copyPages(source, [item.pageIndex]);
        pdfDoc.addPage(page);
      }

      const bytes = await pdfDoc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      let nomeFinal = "UNIDOC-ProImagem.pdf";
      
      if (prestador || dataPagamento || valor) {
        // 1. Formata a data de AAAA-MM-DD para DD-MM-AAAA
        const dataFormatada = dataPagamento ? dataPagamento.split('-').reverse().join('-') : "";
        
        // 2. Garante o formato do valor com PONTO (ex: R$ 1.600.00)
        let valorComPonto = valor ? valor.replace(/,/g, '.') : "";
        
        // PADRÃO EXATO EXIGIDO: DATA DE PAGAMENTO; BOLETO E COMPROVANTE; NOME DO PRESTADOR; VALOR
        nomeFinal = `${dataFormatada}; BOLETO E COMPROVANTE; ${prestador || "Prestador"}; ${valorComPonto}.pdf`;
        
        // Limpa possíveis espaços duplicados causados pela formatação
        nomeFinal = nomeFinal.replace(/\s+/g, ' ');
      }

      a.href = url;
      a.download = nomeFinal;
      a.click();
      URL.revokeObjectURL(url);

      setMessage({ type: 'success', text: 'PDF gerado e padronizado com sucesso!' });
    } catch (error) {
      setMessage({ type: 'error', text: 'Erro ao gerar PDF.' });
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="tool-box">
      <h2>Juntar PDFs</h2>
      <div
        className="dropzone"
        onDragOver={(e) => e.preventDefault()}
        onDrop={(e) => {
          e.preventDefault();
          handleFiles(e);
        }}
        onClick={() => document.getElementById('pdf-input').click()}
      >
        <h3>📂 Arraste seus arquivos PDF</h3>
        <p>Clique ou arraste para enviar</p>
        <input
          id="pdf-input"
          type="file"
          hidden
          multiple
          accept=".pdf"
          onChange={handleFiles}
        />
      </div>

      {message && (
        <div className={`alert ${message.type}`}>
          {message.text}
        </div>
      )}

      {pages.length > 0 && (
        <>
          <div className="pages">
            {pages.map(page => (
              <PagePreview key={page.id} page={page} />
            ))}
          </div>

          <hr style={{ margin: '30px 0', border: 'none', borderTop: '1px solid var(--border)' }} />
          
          <h3 style={{ marginBottom: '15px', color: 'var(--primary)' }}>Dados Reconhecidos do Documento</h3>
          
          <div className="form-grid">
            <div className="field">
              <label>Data de Pagamento:</label>
              <input 
                type="date" 
                value={dataPagamento} 
                onChange={(e) => setDataPagamento(e.target.value)} 
              />
            </div>
            <div className="field">
              <label>Nome do Prestador / Empresa:</label>
              <input 
                type="text" 
                placeholder="Ex: Clinica X ou Empresa LTDA" 
                value={prestador} 
                onChange={(e) => setPrestador(e.target.value)} 
              />
            </div>
            <div className="field">
              <label>Valor (R$):</label>
              <input 
                type="text" 
                placeholder="R$ 1.600.00" 
                value={valor} 
                onChange={handleValorChange} 
              />
            </div>
          </div>

          <div className="action-area">
            <button className="btn" onClick={generatePDF}>
              {loading ? 'Gerando...' : 'Gerar e Salvar PDF'}
            </button>
            <button 
              className="btn" 
              style={{ background: '#666' }} 
              onClick={() => { 
                setPages([]); 
                setMessage(null); 
                setPrestador(""); 
                setDataPagamento(""); 
                setValor(""); 
              }}
            >
              Limpar Tudo
            </button>
          </div>
        </>
      )}
    </div>
  );
}

function SplitTool() {
  const [file, setFile] = useState(null);
  const [startPage, setStartPage] = useState(1);
  const [endPage, setEndPage] = useState(1);
  const [numPages, setNumPages] = useState(0);
  const [loading, setLoading] = useState(false);
  const [message, setMessage] = useState(null);

  async function handleFile(e) {
    const selected = e.target.files?.[0] || e.dataTransfer.files?.[0];
    if (selected && selected.type === 'application/pdf') {
      setFile(selected);
      const buffer = await selected.arrayBuffer();
      const pdfDoc = await PDFLib.PDFDocument.load(buffer);
      const total = pdfDoc.getPageCount();
      setNumPages(total);
      setStartPage(1);
      setEndPage(total);
      setMessage(null);
    }
  }

  async function generatePDF() {
    if (!file) return;
    try {
      setLoading(true);
      const buffer = await file.arrayBuffer();
      const source = await PDFLib.PDFDocument.load(buffer);
      const pdfDoc = await PDFLib.PDFDocument.create();
      const pageIndices = [];
      for (let i = startPage - 1; i < endPage; i++) {
        if (i >= 0 && i < numPages) pageIndices.push(i);
      }
      const copiedPages = await pdfDoc.copyPages(source, pageIndices);
      copiedPages.forEach(page => pdfDoc.addPage(page));
      const bytes = await pdfDoc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Dividido-${file.name}`;
      a.click();
      URL.revokeObjectURL(url);
      setMessage({ type: 'success', text: 'PDF dividido com sucesso!' });
    } catch (error) {
      setMessage({ type: 'error', text: 'Erro ao dividir PDF. Verifique as páginas.' });
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="tool-box">
      <h2>Dividir PDF</h2>
      {!file ? (
        <div
          className="dropzone"
          onDragOver={(e) => e.preventDefault()}
          onDrop={(e) => { e.preventDefault(); handleFile(e); }}
          onClick={() => document.getElementById('pdf-input-split').click()}
        >
          <h3>📂 Selecione o arquivo PDF</h3>
          <p>Clique ou arraste para enviar</p>
          <input id="pdf-input-split" type="file" hidden accept=".pdf" onChange={handleFile} />
        </div>
      ) : (
        <>
          <div className="alert success" style={{ marginBottom: '20px' }}>
            Arquivo selecionado: <strong>{file.name}</strong> ({numPages} páginas)
          </div>
          <div className="form-grid">
            <div className="field">
              <label>Página Inicial:</label>
              <input type="number" min="1" max={numPages} value={startPage} onChange={(e) => setStartPage(Number(e.target.value))} />
            </div>
            <div className="field">
              <label>Página Final:</label>
              <input type="number" min="1" max={numPages} value={endPage} onChange={(e) => setEndPage(Number(e.target.value))} />
            </div>
          </div>
          <div className="action-area">
            <button className="btn" onClick={generatePDF}>{loading ? 'Processando...' : 'Extrair Páginas'}</button>
            <button className="btn" style={{background: '#666'}} onClick={() => {setFile(null); setMessage(null);}}>Cancelar</button>
          </div>
        </>
      )}
      {message && <div className={`alert ${message.type}`}>{message.text}</div>}
    </div>
  );
}

function RotateTool() {
  const [file, setFile] = useState(null);
  const [angle, setAngle] = useState(90);
  const [loading, setLoading] = useState(false);
  const [message, setMessage] = useState(null);

  async function handleFile(e) {
    const selected = e.target.files?.[0] || e.dataTransfer.files?.[0];
    if (selected && selected.type === 'application/pdf') {
      setFile(selected);
      setMessage(null);
    }
  }

  async function generatePDF() {
    if (!file) return;
    try {
      setLoading(true);
      const buffer = await file.arrayBuffer();
      const pdfDoc = await PDFLib.PDFDocument.load(buffer);
      const pages = pdfDoc.getPages();
      pages.forEach(page => {
        const currentRotation = page.getRotation().angle;
        page.setRotation(PDFLib.degrees(currentRotation + Number(angle)));
      });
      const bytes = await pdfDoc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Rotacionado-${file.name}`;
      a.click();
      URL.revokeObjectURL(url);
      setMessage({ type: 'success', text: 'PDF rotacionado com sucesso!' });
    } catch (error) {
      setMessage({ type: 'error', text: 'Erro ao rotacionar PDF.' });
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="tool-box">
      <h2>Rotacionar PDF</h2>
      {!file ? (
        <div
          className="dropzone"
          onDragOver={(e) => e.preventDefault()}
          onDrop={(e) => { e.preventDefault(); handleFile(e); }}
          onClick={() => document.getElementById('pdf-input-rotate').click()}
        >
          <h3>🔄 Selecione o arquivo PDF</h3>
          <p>Clique ou arraste para enviar</p>
          <input id="pdf-input-rotate" type="file" hidden accept=".pdf" onChange={handleFile} />
        </div>
      ) : (
        <>
          <div className="alert success" style={{ marginBottom: '20px' }}>
            Arquivo selecionado: <strong>{file.name}</strong>
          </div>
          <div className="form-grid">
            <div className="field">
              <label>Graus de Rotação:</label>
              <select value={angle} onChange={(e) => setAngle(e.target.value)}>
                <option value="90">90 Graus (Horário)</option>
                <option value="-90">90 Graus (Anti-horário)</option>
                <option value="180">180 Graus (Inverter)</option>
              </select>
            </div>
          </div>
          <div className="action-area">
            <button className="btn" onClick={generatePDF}>{loading ? 'Processando...' : 'Aplicar Rotação'}</button>
            <button className="btn" style={{background: '#666'}} onClick={() => {setFile(null); setMessage(null);}}>Cancelar</button>
          </div>
        </>
      )}
      {message && <div className={`alert ${message.type}`}>{message.text}</div>}
    </div>
  );
}

function BackendRequiredTool({ title, desc }) {
  return (
    <div className="tool-box">
      <h2>{title}</h2>
      <p style={{ marginTop: '15px', color: '#666' }}>{desc}</p>
      <div className="alert error" style={{ marginTop: '20px' }}>
        <strong>Atenção:</strong> Por motivos de segurança e limitações do navegador, esta função requer processamento em um servidor (Backend) e não está disponível na versão front-end nativa.
      </div>
    </div>
  );
}

function Dashboard({setTool}){
  const tools = [
    { id:'merge', icon:'📄', title:'Juntar PDF', desc:'Combine vários PDFs' },
    { id:'split', icon:'✂️', title:'Dividir PDF', desc:'Separar páginas' },
    { id:'compress', icon:'📉', title:'Comprimir PDF', desc:'Reduzir tamanho' },
    { id:'protect', icon:'🔒', title:'Proteger PDF', desc:'Adicionar senha' },
    { id:'rotate', icon:'🔄', title:'Rotacionar PDF', desc:'Girar páginas' }
  ];
  return(
    <div className="grid">
      {tools.map(tool=>(
        <div key={tool.id} className="card" onClick={()=>setTool(tool.id)}>
          <div className="icon">{tool.icon}</div>
          <h3>{tool.title}</h3>
          <p>{tool.desc}</p>
        </div>
      ))}
    </div>
  )
}

function App(){
  const [tool,setTool] = useState(null);

  useEffect(()=>{
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  },[]);

  return(
    <>
      <header>
        <div className="container header-content">
          <div className="logo-area">
            <img src="COLE_SUA_IMAGEM_BASE64_AQUI" alt="Logo" />
            <div className="logo-text">
              <h1>UNIDOC</h1>
              <p>Plataforma inteligente de PDFs</p>
            </div>
          </div>
          {tool && (
            <button className="btn" onClick={()=>setTool(null)}>Voltar</button>
          )}
        </div>
      </header>

      <section className="hero">
        <h2>Plataforma Profissional de PDFs</h2>
        <p>Sistema moderno para juntar, dividir, proteger, comprimir e organizar PDFs.</p>
      </section>

      <main className="container">
        {!tool && <Dashboard setTool={setTool} />}
        {tool === 'merge' && <MergeTool />}
        {tool === 'split' && <SplitTool />}
        {tool === 'rotate' && <RotateTool />}
        {tool === 'compress' && <BackendRequiredTool title="Comprimir PDF" desc="Reduza o tamanho do arquivo preservando a qualidade." />}
        {tool === 'protect' && <BackendRequiredTool title="Proteger PDF" desc="Adicione uma camada de segurança com senha criptografada." />}
      </main>

      <footer>
        <p>© 2026 ProImagem - Exames e Consultas</p>
        <p style={{marginTop:'10px'}}>Desenvolvido por <strong>Carlos Henrique</strong></p>
      </footer>
    </>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
