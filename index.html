<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PDFusion — Pro Imagem</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{

  --brand-blue:#244677;
  --brand-cyan:#009dda;
  --brand-orange:#f26f21;
  --brand-dark:#58595b;

  --bg:#f4f7fa;
  --surface:#ffffff;
  --s2:#f8fafc;
  --s3:#f1f5f9;

  --border:#e2e8f0;
  --border2:#cbd5e1;

  --text:#334155;
  --heading:var(--brand-blue);
  --muted:#64748b;

  --accent:var(--brand-orange);

  --green:#10b981;
  --red:#ef4444;

  --r:22px;

  --font:'Montserrat',sans-serif;
  --body:'Inter',sans-serif;
}

body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

#root{
  min-height:100vh;
}

body::before{
  content:'';
  position:fixed;
  inset:0;

  background:
    radial-gradient(
      ellipse 60% 40% at 80% 10%,
      rgba(0,157,218,.05) 0%,
      transparent 60%
    ),

    radial-gradient(
      ellipse 50% 35% at 10% 90%,
      rgba(242,111,33,.04) 0%,
      transparent 60%
    );

  pointer-events:none;
  z-index:0;
}

/* SPLASH */

.splash{
  position:fixed;
  inset:0;
  background:#fff;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;

  z-index:999;
}

.splash-logo{
  width:120px;

  filter:
    drop-shadow(
      0 10px 30px rgba(36,70,119,.12)
    );
}

.splash-wordmark{
  font-family:var(--font);
  font-size:2.8rem;
  font-weight:900;
  letter-spacing:-1px;

  color:var(--brand-orange);
}

.splash-wordmark em{
  font-style:normal;
  color:var(--brand-blue);
}

.splash-track{
  width:200px;
  height:5px;

  background:#edf2f7;

  border-radius:20px;
  overflow:hidden;
}

.splash-fill{
  height:100%;
  width:0;

  background:
    linear-gradient(
      90deg,
      var(--brand-cyan),
      var(--brand-orange)
    );

  animation:load 2.2s ease forwards;
}

@keyframes load{
  to{
    width:100%;
  }
}

.splash-sub{
  color:var(--muted);
  font-size:.85rem;
  font-weight:600;
}

/* APP */

.app{
  position:relative;
  z-index:1;

  max-width:1260px;

  margin:0 auto;

  padding:40px 24px 70px;
}

/* HEADER */

.hdr{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  flex-wrap:wrap;

  gap:20px;

  margin-bottom:40px;
}

.brand-wrap{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo-clinica{
  width:92px;
  height:92px;

  object-fit:contain;

  background:#fff;

  padding:10px;

  border-radius:24px;

  border:1px solid rgba(36,70,119,.08);

  box-shadow:
    0 10px 35px rgba(36,70,119,.08);
}

.wordmark{
  font-family:var(--font);
  font-size:2.5rem;
  font-weight:900;

  color:var(--brand-orange);

  letter-spacing:-1px;
}

.wordmark em{
  font-style:normal;
  color:var(--brand-blue);
}

.hdr-sub{
  margin-top:5px;

  color:var(--brand-dark);

  font-size:.92rem;
  font-weight:500;
}

.badge{
  background:rgba(0,157,218,.08);

  border:1px solid rgba(0,157,218,.18);

  padding:8px 15px;

  border-radius:100px;

  font-size:.78rem;
  font-weight:700;

  color:var(--brand-blue);

  display:flex;
  align-items:center;
  gap:10px;
}

.badge-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:var(--brand-cyan);

  box-shadow:
    0 0 10px rgba(0,157,218,.5);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:370px 1fr;
  gap:24px;
  align-items:start;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* CARD */

.card{
  background:rgba(255,255,255,.76);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.5);

  border-radius:24px;

  overflow:hidden;

  box-shadow:
    0 10px 40px rgba(15,23,42,.06),
    0 2px 10px rgba(15,23,42,.04);
}

/* CARD HEADER */

.ch{
  padding:22px 26px;

  display:flex;
  align-items:center;
  gap:14px;

  background:
    linear-gradient(
      135deg,
      rgba(0,157,218,.04),
      rgba(242,111,33,.04)
    );

  border-bottom:1px solid rgba(226,232,240,.8);
}

.ch-ic{
  width:42px;
  height:42px;

  border-radius:14px;

  background:rgba(0,157,218,.1);

  display:flex;
  align-items:center;
  justify-content:center;

  color:var(--brand-cyan);
}

.ch-title{
  font-family:var(--font);
  font-size:1.05rem;
  font-weight:800;
  color:var(--brand-blue);
}

.ch-sub{
  margin-top:2px;

  font-size:.75rem;
  color:var(--muted);
}

.cb{
  padding:24px;
}

/* DROPZONE */

.drop{
  border:2px dashed rgba(0,157,218,.25);

  border-radius:20px;

  padding:48px 24px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.98),
      rgba(248,250,252,.98)
    );

  text-align:center;

  cursor:pointer;

  transition:.25s;

  position:relative;
}

.drop:hover{
  transform:translateY(-4px);

  border-color:var(--brand-orange);

  box-shadow:
    0 12px 30px rgba(242,111,33,.10);
}

.drop input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.drop-ic{
  margin-bottom:14px;

  color:var(--brand-cyan);
}

.drop:hover .drop-ic{
  color:var(--brand-orange);
}

.drop-txt{
  color:var(--muted);
  line-height:1.7;
}

.drop-txt strong{
  color:var(--brand-blue);
  font-size:.95rem;
}

/* INPUTS */

.fl{
  display:block;

  margin-bottom:7px;

  font-size:.73rem;
  font-weight:700;

  color:var(--brand-blue);

  text-transform:uppercase;
  letter-spacing:.6px;
}

.fi{
  width:100%;

  padding:13px 16px;

  border-radius:12px;

  background:rgba(255,255,255,.92);

  border:1px solid rgba(203,213,225,.9);

  outline:none;

  margin-bottom:16px;

  font-size:.92rem;

  transition:.2s;
}

.fi:hover{
  border-color:rgba(0,157,218,.35);
}

.fi:focus{
  border-color:var(--brand-cyan);

  box-shadow:
    0 0 0 4px rgba(0,157,218,.12);

  transform:translateY(-1px);
}

.fi.ok{
  border-color:var(--green);
}

/* ALERT */

.ds{
  background:rgba(16,185,129,.06);

  border:1px solid rgba(16,185,129,.18);

  border-radius:12px;

  padding:14px;

  margin-bottom:20px;

  display:flex;
  gap:10px;

  font-size:.82rem;
  font-weight:500;

  color:var(--green);

  line-height:1.6;
}

/* DIV */

.div{
  height:1px;
  background:var(--border);
  margin:24px 0;
}

/* FILE NAME */

.fnbox{
  background:
    linear-gradient(
      135deg,
      rgba(36,70,119,.03),
      rgba(0,157,218,.03)
    );

  border:1px solid rgba(36,70,119,.08);

  border-left:4px solid var(--brand-blue);

  border-radius:14px;

  padding:16px;
}

.fnlabel{
  font-size:.72rem;
  font-weight:800;

  text-transform:uppercase;
  letter-spacing:1px;

  color:var(--muted);

  margin-bottom:8px;
}

.fnval{
  font-family:monospace;
  font-size:.85rem;
  font-weight:700;

  color:var(--brand-orange);

  line-height:1.7;
}

.fnempty{
  color:var(--muted);
  font-size:.82rem;
}

/* PREVIEW */

.pv-wrap{
  min-height:320px;

  background:
    linear-gradient(
      180deg,
      #f8fafc,
      #f1f5f9
    );

  border:1px solid var(--border);

  border-radius:18px;

  padding:18px;

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(140px,1fr));

  gap:18px;

  max-height:560px;

  overflow-y:auto;
}

.pc{
  position:relative;

  background:#fff;

  border:1px solid rgba(226,232,240,.8);

  border-radius:16px;

  overflow:hidden;

  cursor:grab;

  transition:.25s;

  box-shadow:
    0 4px 10px rgba(15,23,42,.04);
}

.pc:hover{
  transform:
    translateY(-5px)
    scale(1.02);

  border-color:var(--brand-cyan);

  box-shadow:
    0 14px 30px rgba(0,157,218,.12);
}

.pc.drag{
  opacity:.4;
}

.pc-thumb{
  height:145px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      180deg,
      #ffffff,
      #f8fafc
    );

  padding:5px;
}

.pc-thumb img,
.pc-thumb canvas{
  max-width:100%;
  max-height:100%;

  object-fit:contain;

  border-radius:6px;

  border:1px solid #edf2f7;
}

.pc-num{
  position:absolute;
  top:8px;
  left:8px;

  background:var(--brand-blue);

  color:#fff;

  padding:4px 8px;

  border-radius:7px;

  font-size:.65rem;
  font-weight:800;
}

.pc-del{
  position:absolute;
  top:8px;
  right:8px;

  width:26px;
  height:26px;

  border:none;

  border-radius:8px;

  background:#fff;

  color:var(--red);

  cursor:pointer;

  display:none;

  box-shadow:
    0 4px 10px rgba(0,0,0,.1);
}

.pc:hover .pc-del{
  display:flex;
  align-items:center;
  justify-content:center;
}

.pc-del:hover{
  background:var(--red);
  color:#fff;
}

.pc-name{
  padding:10px;

  border-top:1px solid var(--border);

  font-size:.7rem;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

  font-weight:600;
}

/* EMPTY */

.empty{
  grid-column:1/-1;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:14px;

  padding:70px 0;

  color:var(--muted);
}

/* BUTTONS */

.bot{
  margin-top:20px;

  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;

  gap:14px;
}

.pg-count{
  font-size:.86rem;
  color:var(--muted);
}

.pg-count strong{
  color:var(--brand-blue);
}

.btn-clr{
  background:#fff;

  border:1px solid var(--border2);

  padding:11px 18px;

  border-radius:12px;

  cursor:pointer;

  font-weight:600;

  transition:.2s;
}

.btn-clr:hover{
  border-color:var(--red);
  color:var(--red);
}

.btn-gen{
  background:
    linear-gradient(
      135deg,
      var(--brand-orange),
      #ff8f4d
    );

  border:none;

  color:#fff;

  padding:14px 34px;

  border-radius:14px;

  font-family:var(--font);

  font-size:.92rem;

  font-weight:800;

  letter-spacing:.4px;

  cursor:pointer;

  transition:.22s;

  display:flex;
  align-items:center;
  gap:8px;

  box-shadow:
    0 10px 25px rgba(242,111,33,.25);

  text-transform:uppercase;
}

.btn-gen:hover:not(:disabled){
  transform:translateY(-3px);

  box-shadow:
    0 16px 34px rgba(242,111,33,.35);
}

.btn-gen:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.spin{
  width:16px;
  height:16px;

  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;

  border-radius:50%;

  animation:spin .6s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* FOOTER */

footer{
  margin-top:70px;

  text-align:center;

  font-size:.8rem;

  color:var(--muted);
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useRef, useEffect } = React;

function App(){

  const [ready,setReady] = useState(false);

  useEffect(() => {

    setTimeout(() => {
      setReady(true);
    },1800);

  },[]);

  if(!ready){
    return(

      <div className="splash">

        <img
          src="logo-pro-imagem(1).jpg"
          className="splash-logo"
        />

        <div className="splash-wordmark">
          PDF<em>fusion</em>
        </div>

        <div className="splash-track">
          <div className="splash-fill"></div>
        </div>

        <div className="splash-sub">
          Carregando ambiente seguro...
        </div>

      </div>

    )
  }

  return(

    <div className="app">

      <header className="hdr">

        <div className="brand-wrap">

          <img
            src="logo-pro-imagem(1).jpg"
            className="logo-clinica"
          />

          <div>

            <div className="wordmark">
              PDF<em>fusion</em>
            </div>

            <div className="hdr-sub">
              Sistema inteligente para organização de documentos
            </div>

          </div>

        </div>

        <div className="badge">
          <span className="badge-dot"></span>
          Processamento 100% Seguro
        </div>

      </header>

      <div className="grid">

        <div style={{
          display:'flex',
          flexDirection:'column',
          gap:'24px'
        }}>

          <div className="card">

            <div className="ch">

              <div className="ch-ic">
                📎
              </div>

              <div>
                <div className="ch-title">
                  Adicionar Arquivos
                </div>

                <div className="ch-sub">
                  PDF, JPG e PNG
                </div>
              </div>

            </div>

            <div className="cb">

              <label>

                <div className="drop">

                  <div className="drop-ic">
                    <svg width="42" height="42" fill="none" stroke="currentColor" strokeWidth="1.7" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                  </div>

                  <div className="drop-txt">
                    <strong>Clique para selecionar</strong>
                    <br/>
                    ou arraste os arquivos aqui
                  </div>

                  <input type="file" multiple />

                </div>

              </label>

            </div>

          </div>

          <div className="card">

            <div className="ch">

              <div className="ch-ic">
                ✏️
              </div>

              <div>
                <div className="ch-title">
                  Detalhes do Documento
                </div>

                <div className="ch-sub">
                  Personalize o nome final
                </div>
              </div>

            </div>

            <div className="cb">

              <div className="ds">
                ✓ Dados detectados automaticamente
              </div>

              <label className="fl">
                Data
              </label>

              <input className="fi" placeholder="05.12.25"/>

              <label className="fl">
                Tipo
              </label>

              <input className="fi" value="BOLETO E COMPROVANTE"/>

              <label className="fl">
                Prestador
              </label>

              <input className="fi" placeholder="Ex: Unimed"/>

              <label className="fl">
                Valor
              </label>

              <input className="fi" placeholder="R$ 150.00"/>

              <div className="div"></div>

              <div className="fnbox">

                <div className="fnlabel">
                  Nome do arquivo gerado
                </div>

                <div className="fnval">
                  05.12.25 BOLETO E COMPROVANTE UNIMED R$150.00.pdf
                </div>

              </div>

            </div>

          </div>

        </div>

        <div className="card">

          <div className="ch">

            <div className="ch-ic">
              📄
            </div>

            <div>

              <div className="ch-title">
                Organizar Páginas
              </div>

              <div className="ch-sub">
                Arraste para reordenar
              </div>

            </div>

          </div>

          <div className="cb">

            <div className="pv-wrap">

              <div className="empty">

                <svg width="54" height="54" fill="none" stroke="currentColor" strokeWidth="1.2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>

                <div>
                  Nenhum arquivo adicionado
                </div>

              </div>

            </div>

            <div className="bot">

              <div className="pg-count">
                <strong>0</strong> páginas
              </div>

              <div style={{
                display:'flex',
                gap:'12px'
              }}>

                <button className="btn-clr">
                  Limpar Tudo
                </button>

                <button className="btn-gen">

                  <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/>
                  </svg>

                  Salvar PDF

                </button>

              </div>

            </div>

          </div>

        </div>

      </div>

      <footer>
        PDFusion para Pro Imagem · Processamento 100% local e seguro
      </footer>

    </div>

  )

}

ReactDOM.createRoot(
  document.getElementById('root')
).render(<App />);

</script>

</body>
</html>
